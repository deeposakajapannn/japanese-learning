<style>
:root {
  --bg: #f5f0eb;
  --card: #ffffff;
  --primary: #e8735a;
  --primary-light: #fdf0ed;
  --primary-dark: #c9563f;
  --accent: #5b8a72;
  --accent-light: #eef5f0;
  --text: #2d2d2d;
  --text-secondary: #777;
  --border: #e8e2dc;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
  background: var(--bg) url('bg.jpg') center / 600px repeat;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(245,240,235,0.75);
  z-index: 0; pointer-events: none;
}
body > * { position: relative; z-index: 1; }
/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, #e8a05a 100%);

  padding: 20px 24px 16px;

.header-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }

/* ===== Layout ===== */
.app-layout { display: flex; min-height: 100vh; }
.main-content { flex: 1; min-width: 0; padding-bottom: 80px; }
.nav-logo { display: none; }

/* ===== Nav (mobile: bottom bar) ===== */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  display: flex; gap: 0; padding: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex: 1;
  padding: 10px 0 8px;
  border: none;
  border-radius: 0;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: var(--text-secondary);
  box-shadow: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.nav-btn .nav-icon { font-size: 22px; }
.nav-btn.active {
  color: var(--primary);
  background: transparent;
  box-shadow: none;
}

/* ===== Category Tabs ===== */
.cat-tabs { display: flex; gap: 8px; padding: 4px 16px 12px; flex-wrap: wrap; }
.cat-btn {
  padding: 7px 16px;
  border: 2px solid var(--border);
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  background: transparent;
  color: var(--text-secondary);
  transition: all 0.3s;
}
.cat-btn.active {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}

/* ===== Panels ===== */
.panel { display: none; padding: 0 16px 20px; }
.panel.active { display: block; }

/* ===== List Toolbar ===== */

/* ===== List View ===== */


.list-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  animation: fadeUp 0.3s ease;
}
.list-item:active { transform: scale(0.98); }
.list-num {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
}
.list-body { flex: 1; min-width: 0; }
.list-word { font-size: 20px; font-weight: 700; }
.list-reading { font-size: 13px; color: var(--primary); margin-top: 2px; }
.list-meaning { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
.list-example { font-size: 13px; color: var(--text-secondary); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); line-height: 1.5; }
.speak-btn {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border: none;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.speak-btn:active { background: var(--primary); color: white; }

/* ===== Card / Study Mode ===== */
.study-container { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
.study-progress {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  font-weight: 600;
}
.card {
  width: 100%;
  max-width: 400px;
  min-height: 280px;
  perspective: 1000px;
  cursor: pointer;
  margin-bottom: 24px;
}
.card-inner {
  position: relative;
  width: 100%;
  min-height: 280px;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  transform-style: preserve-3d;
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-front, .card-back {
  position: absolute;
  width: 100%;
  min-height: 280px;
  backface-visibility: hidden;
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
}
.card-front {
  background: linear-gradient(160deg, #fff 0%, #fdf8f5 100%);
}
.card-back {
  background: linear-gradient(160deg, var(--accent-light) 0%, #fff 100%);
  transform: rotateY(180deg);
}
.card-word { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
.card-hint { font-size: 14px; color: var(--text-secondary); }
.card-reading { font-size: 18px; color: var(--primary); margin-bottom: 8px; }
.card-meaning { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.card-example { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-top: 8px; }

.study-actions { display: flex; gap: 12px; width: 100%; max-width: 400px; }
.study-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.study-btn:active { transform: scale(0.96); }
.btn-prev { background: var(--card); color: var(--text); box-shadow: var(--shadow); }
.btn-speak { background: var(--primary-light); color: var(--primary); }
.btn-next { background: var(--primary); color: white; box-shadow: 0 4px 16px rgba(232,115,90,0.3); }

/* ===== Quiz Mode ===== */
.quiz-card {
  width: 100%;
  max-width: 400px;
  background: var(--card);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  padding: 40px 28px;
  text-align: center;
  margin: 20px auto 24px;
}
.quiz-word { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
.quiz-reading-hidden { font-size: 14px; color: var(--text-secondary); }
.quiz-answer { margin-top: 20px; display: none; }
.quiz-answer.show { display: block; animation: fadeUp 0.3s ease; }
.quiz-answer-reading { font-size: 16px; color: var(--primary); margin-bottom: 4px; }
.quiz-answer-meaning { font-size: 22px; font-weight: 700; color: var(--accent); }
.quiz-answer-example { font-size: 13px; color: var(--text-secondary); margin-top: 10px; line-height: 1.6; }

.quiz-actions { display: flex; gap: 12px; max-width: 400px; margin: 0 auto; }
.btn-show {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  display: block;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
  cursor: pointer;
}
.btn-know {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 16px rgba(91,138,114,0.3);
}
.btn-dunno {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  background: var(--primary);
  color: white;
  box-shadow: 0 4px 16px rgba(232,115,90,0.3);
}

/* ===== Stats ===== */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px 16px;
  box-shadow: var(--shadow);
  text-align: center;
}
.stat-num { font-size: 32px; font-weight: 800; }
.stat-num.green { color: var(--accent); }
.stat-num.orange { color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.stat-section {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.stat-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.chart-container { width: 100%; height: 200px; position: relative; }
.chart-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.chart-bar-label { font-size: 11px; color: var(--text-secondary); width: 40px; text-align: right; flex-shrink: 0; }
.chart-bar-track { flex: 1; height: 24px; background: var(--bg); border-radius: 12px; overflow: hidden; display: flex; }
.chart-bar-fill-green { height: 100%; background: var(--accent); border-radius: 12px 0 0 12px; transition: width 0.5s; }
.chart-bar-fill-orange { height: 100%; background: var(--primary); transition: width 0.5s; }
.chart-bar-value { font-size: 11px; color: var(--text-secondary); width: 36px; flex-shrink: 0; }
.reset-btn {
  width: 100%;
  padding: 14px;
  border: 2px solid #e74c3c;
  border-radius: var(--radius);
  background: transparent;
  color: #e74c3c;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 12px;
}
.wrong-list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.wrong-list-item:last-child { border: none; }
.wrong-word { font-weight: 700; font-size: 18px; }
.wrong-meaning { color: var(--text-secondary); }
.wrong-count { margin-left: auto; background: var(--primary-light); color: var(--primary); padding: 2px 10px; border-radius: 50px; font-size: 12px; font-weight: 600; }

/* ===== Animations ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Login Overlay ===== */
.login-overlay {

/* ===== Loop Player ===== */
.select-cb { width: 20px; height: 20px; accent-color: var(--primary); flex-shrink: 0; margin-right: 8px; }
.loop-bar {
  position: fixed; bottom: 0; left: 0; right: 0;

.loop-btn {

.toolbar-btn {

const DATA = { verbs: [], nouns: [], adjectives: [], sentences: [] };
let AUDIO_MAP = {};

async function loadData() {
  try {
    const [verbs, nouns, adjectives, sentences, audioMap] = await Promise.all([
      fetch('data/verbs.json').then(r => r.json()),
      fetch('data/nouns.json').then(r => r.json()),
      fetch('data/adjectives.json').then(r => r.json()),
      fetch('data/sentences.json').then(r => r.json()),
      fetch('data/audio_map.json').then(r => r.json())
    ]);
    DATA.verbs = verbs;
    DATA.nouns = nouns;
    DATA.adjectives = adjectives;
    DATA.sentences = sentences;
    AUDIO_MAP = audioMap;
  } catch (e) {
    document.getElementById('listContainer').innerHTML = '<div class="loading" style="color:#e74c3c">数据加载失败，请刷新页面重试</div>';
    throw e;
  }
}

function generateId() {
  // Generate short readable ID like "kaze-3827"
  const words = ['sakura','kaze','yama','umi','sora','hana','tsuki','hoshi','kumo','ame','yuki','mori','kawa','take','ishi'];
  const word = words[Math.floor(Math.random() * words.length)];
  const num = Math.floor(1000 + Math.random() * 9000);
  return word + '-' + num;
}

function handleLogin() {
  const input = document.getElementById('loginId').value.trim().toLowerCase();
  const msg = document.getElementById('loginMsg');
  const btn = document.getElementById('loginBtn');
  if (!input || input.length < 2) { msg.textContent = 'ID至少2个字符'; msg.className = 'login-msg error'; return; }
  if (!/^[a-z0-9_-]+$/.test(input)) { msg.textContent = '只能用英文小写、数字、-、_'; msg.className = 'login-msg error'; return; }
  btn.disabled = true;
  msg.textContent = '正在查找...'; msg.className = 'login-msg';

  db.ref('users/' + input).once('value').then(snap => {
    if (snap.exists()) {
      msg.textContent = '找到数据，正在恢复...'; msg.className = 'login-msg success';
      const data = snap.val();
      localStats = data.stats || {};
      localCounts = data.counts || {};
      localStorage.setItem('jp_stats', JSON.stringify(localStats));
      localStorage.setItem('jp_item_counts', JSON.stringify(localCounts));
      localStorage.setItem('jp_delays', JSON.stringify(data.delays || {}));
      userId = input;
      localStorage.setItem('jp_user_id', userId);
      btn.disabled = false;
      setTimeout(() => {
        document.getElementById('loginOverlay').style.display = 'none';
        updateHeaderUser();
        updateProfileId();
        renderList();
        if (currentMode === 'stats') renderStats();
      }, 600);
    } else {
      msg.textContent = '未找到此ID的数据'; msg.className = 'login-msg error';
      btn.disabled = false;
    }
  }).catch(err => {
    msg.textContent = '连接失败，请检查网络'; msg.className = 'login-msg error';
    btn.disabled = false;
  });
}

function showRestoreOverlay() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginId').value = '';
  document.getElementById('loginMsg').textContent = '';
}

function copyId() {
  navigator.clipboard.writeText(userId).then(() => {
    const btn = event.target;
    btn.textContent = '已复制!';
    setTimeout(() => btn.textContent = '复制ID', 1500);
  });
}

function updateProfileId() {
  const el = document.getElementById('profileId');
  if (el) el.textContent = userId;
}

function syncToCloud() {
  if (!userId || !db) return;
  const data = { stats: localStats, counts: localCounts, delays: JSON.parse(localStorage.getItem('jp_delays') || '{}') };
  // Only sync if there's actual data, never overwrite with empty
  if (Object.keys(localStats).length === 0 && Object.keys(localCounts).length === 0) return;
  db.ref('users/' + userId).set(data);
}

function debouncedSync() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 2000);
}

function getStats() {
  return JSON.parse(localStorage.getItem('jp_stats') || '{}');
}
function saveStats(s) {
  localStorage.setItem('jp_stats', JSON.stringify(s));
  localStats = s;
  debouncedSync();
}
function todayKey() {
  return new Date().toISOString().slice(0, 10);
}
function getItemCounts() {
  return JSON.parse(localStorage.getItem('jp_item_counts') || '{}');
}
function saveItemCounts(c) {
  localStorage.setItem('jp_item_counts', JSON.stringify(c));
  localCounts = c;
  debouncedSync();
}
const MASTERED_THRESHOLD = 50;
function recordItemSeen(cat, id) {
  const c = getItemCounts();
  const key = cat + ':' + id;
  c[key] = (c[key] || 0) + 1;
  saveItemCounts(c);
  return c[key];
}
function getActiveItems(cat) {
  const c = getItemCounts();
  const delays = getDelays();
  const today = new Date().toISOString().slice(0, 10);
  if (cat === 'mix') {
    let all = [];
    for (const k of ['nouns', 'sentences']) {
      DATA[k].forEach(it => {
        const key = k + ':' + it.id;
        if ((c[key] || 0) < MASTERED_THRESHOLD && !(delays[key] > today)) {
          all.push({...it, _cat: k});
        }
      });
    }
    // Shuffle
    for (let i = all.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [all[i], all[j]] = [all[j], all[i]];
    }
    return all;
  }
  return DATA[cat].filter(it => {
    const key = cat + ':' + it.id;
    return (c[key] || 0) < MASTERED_THRESHOLD && !(delays[key] > today);
  });
}
function isMastered(cat, id) {
  const c = getItemCounts();
  return (c[cat + ':' + id] || 0) >= MASTERED_THRESHOLD;
}
function getItemCount(cat, id) {
  const c = getItemCounts();
  return c[cat + ':' + id] || 0;
}

let currentLang = localStorage.getItem('jp_lang') || 'zh';
function t(key) { if (typeof LANG === 'undefined') return key; return LANG[currentLang]?.[key] || LANG.zh?.[key] || key; }

function switchLang(lang) {
  currentLang = lang;
  localStorage.setItem('jp_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  applyLang();
}

function applyLang() {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
  // Update all UI text
  const modeLabels = { list: t('tabList'), study: t('tabStudy'), quiz: t('tabQuiz'), stats: t('tabStats') };
  document.querySelectorAll('.nav-btn').forEach(b => {
    const label = b.querySelector('.nav-label');
    if (label && b.dataset.mode && modeLabels[b.dataset.mode]) label.textContent = modeLabels[b.dataset.mode];
  });
  const catLabels = { nouns: t('catNouns'), sentences: t('catSent') };
  document.querySelectorAll('.cat-btn').forEach(b => {
    if (b.dataset.cat && catLabels[b.dataset.cat]) b.textContent = catLabels[b.dataset.cat];
  });
  document.getElementById('searchInput').placeholder = t('search');
  document.querySelector('.card-hint').textContent = t('flipHint');
  // Study buttons
  const studyBtns = document.querySelectorAll('.study-nav .study-btn');
  // Re-render current mode
  if (currentMode === 'list') renderList();
  if (currentMode === 'stats') renderStats();
}

// ===== SPACED REPETITION DELAY =====
function getDelays() {
  return JSON.parse(localStorage.getItem('jp_delays') || '{}');
}
function saveDelays(d) {
  localStorage.setItem('jp_delays', JSON.stringify(d));
  debouncedSync();
}
function delayItem(cat, id, days) {
  const d = getDelays();
  const until = new Date();
  until.setDate(until.getDate() + days);
  d[cat + ':' + id] = until.toISOString().slice(0, 10);
  saveDelays(d);
}
function isDelayed(cat, id) {
  const d = getDelays();
  const until = d[cat + ':' + id];
  if (!until) return false;
  return until > new Date().toISOString().slice(0, 10);
}
function markKnown(days) {
  const items = getActiveItems(currentCat);
  if (!items.length) return;
  const it = items[studyIndex];
  delayItem(it._cat || currentCat, it.id, days || 3);
  renderStudyCard();
}

function recordStudy() {
  const s = getStats();
  const d = todayKey();
  if (!s[d]) s[d] = { studied: 0, quizzed: 0, correct: 0, wrong: {} };
  s[d].studied++;
  saveStats(s);
}
function recordQuiz(item, correct) {
  const s = getStats();
  const d = todayKey();
  if (!s[d]) s[d] = { studied: 0, quizzed: 0, correct: 0, wrong: {} };
  s[d].quizzed++;
  if (correct) s[d].correct++;
  else {
    const key = currentCat + ':' + item.id;
    s[d].wrong[key] = (s[d].wrong[key] || 0) + 1;
  }
  saveStats(s);
}

// ===== Silent audio keepalive (prevents iOS from releasing audio session) =====
let silentAudio = null;
function startSilentKeepAlive() {
  if (silentAudio) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const bufferSize = ctx.sampleRate * 2; // 2 seconds of silence
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  source.connect(ctx.destination);
  source.start();
  silentAudio = { ctx, source };
}
function stopSilentKeepAlive() {
  if (!silentAudio) return;
  silentAudio.source.stop();
  silentAudio.ctx.close();
  silentAudio = null;
}

// ===== TTS =====
function speak(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const fn = AUDIO_MAP[text];
  if (fn) {
    currentAudio = new Audio('audio/' + fn);
    currentAudio.play().catch(() => {});
  }
}
function speakWithExample(word, example) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const fn1 = AUDIO_MAP[word];
  if (!fn1) return;
  currentAudio = new Audio('audio/' + fn1);
  currentAudio.play().catch(() => {});
  if (example && AUDIO_MAP[example]) {
    currentAudio.onended = () => {
      currentAudio = new Audio('audio/' + AUDIO_MAP[example]);
      currentAudio.play().catch(() => {});
    };
  }
}



function updateHeaderUser() {
  const el = document.getElementById('headerUser');
  if (el && userId) el.textContent = userId;
}
// ===== LOOP PLAYER =====
let loopSelected = new Set();
let loopPlaylist = [];
let loopIndex = 0;
let loopRound = 1;
let loopPlaying = false;
let loopPaused = false;
let selectMode = false;

function toggleSelectMode() {
  selectMode = !selectMode;
  loopSelected.clear();
  document.getElementById('selectAllBar').classList.toggle('show', selectMode);
  document.getElementById('selectAllCb').checked = false;
  updateSelectedCount();
  renderListPage();
}

function toggleSelectItem(cat, id, checked) {
  const key = cat + ':' + id;
  if (checked) loopSelected.add(key); else loopSelected.delete(key);
  updateSelectedCount();
}

function toggleSelectAll(checked) {
  const items = document.querySelectorAll('.item-cb');
  items.forEach(cb => { cb.checked = checked; toggleSelectItem(cb.dataset.cat, cb.dataset.id, checked); });
}

function updateSelectedCount() {
  document.getElementById('selectedCount').textContent = loopSelected.size;
}

function startLoop() {
  if (loopSelected.size === 0) return;
  startSilentKeepAlive();
  loopPlaylist = [];
  for (const key of loopSelected) {
    const [cat, id] = key.split(':');
    const item = DATA[cat]?.find(it => it.id === parseInt(id));
    if (item) loopPlaylist.push({...item, _cat: cat});
  }
  loopIndex = 0;
  loopRound = 1;
  loopPlaying = true;
  loopPaused = false;
  document.getElementById('loopBar').classList.add('show');
  document.getElementById('loopCount').textContent = loopPlaylist.length;
  document.getElementById('loopPlayBtn').textContent = '⏸';
  
  // Setup Media Session for lock screen
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: '日本語学習', artist: '循环播放中'
    });
    navigator.mediaSession.setActionHandler('play', () => toggleLoopPlay());
    navigator.mediaSession.setActionHandler('pause', () => toggleLoopPlay());
    navigator.mediaSession.setActionHandler('nexttrack', () => { loopIndex = (loopIndex + 1) % loopPlaylist.length; playLoopItem(); });
    navigator.mediaSession.setActionHandler('previoustrack', () => { loopIndex = (loopIndex - 1 + loopPlaylist.length) % loopPlaylist.length; playLoopItem(); });
  }
  playLoopItem();
}

function playLoopItem() {
  if (!loopPlaying) return;
  const it = loopPlaylist[loopIndex];
  document.getElementById('loopNow').textContent = it.word + ' - ' + it.meaning;
  document.getElementById('loopRound').textContent = loopRound;
  
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: it.word + ' - ' + it.meaning, artist: '第' + loopRound + '轮 · ' + (loopIndex+1) + '/' + loopPlaylist.length
    });
  }

  // Play word audio, then example, then next
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const fn1 = AUDIO_MAP[it.word];
  if (!fn1) { nextLoopItem(); return; }
  
  currentAudio = new Audio('audio/' + fn1);
  currentAudio.play().catch(() => {});
  
  currentAudio.onended = () => {
    if (!loopPlaying || loopPaused) return;
    // Small pause between word and example
    setTimeout(() => {
      if (!loopPlaying || loopPaused) return;
      if (it.example && AUDIO_MAP[it.example]) {
        currentAudio = new Audio('audio/' + AUDIO_MAP[it.example]);
        currentAudio.play().catch(() => {});
        currentAudio.onended = () => {
          if (!loopPlaying || loopPaused) return;
          setTimeout(() => nextLoopItem(), 800);
        };
      } else {
        setTimeout(() => nextLoopItem(), 800);
      }
    }, 500);
  };
}

function nextLoopItem() {
  if (!loopPlaying) return;
  loopIndex++;
  if (loopIndex >= loopPlaylist.length) {
    loopIndex = 0;
    loopRound++;
    document.getElementById('loopRound').textContent = loopRound;
  }
  playLoopItem();
}

function toggleLoopPlay() {
  if (loopPaused) {
    loopPaused = false;
    document.getElementById('loopPlayBtn').textContent = '⏸';
    playLoopItem();
  } else {
    loopPaused = true;
    document.getElementById('loopPlayBtn').textContent = '▶';
    if (currentAudio) currentAudio.pause();
  }
}

function stopLoop() {
  loopPlaying = false;
  loopPaused = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  stopSilentKeepAlive();
  document.getElementById('loopBar').classList.remove('show');
  document.getElementById('listSpeakStop').style.display = 'none';
}


function speakAllList() {
  startSilentKeepAlive();
  // Play all items currently in the filtered list
  loopPlaylist = [];
  for (const it of listFiltered) {
    loopPlaylist.push({...it, _cat: it._cat || currentCat});
  }
  if (!loopPlaylist.length) return;
  loopIndex = 0;
  loopRound = 1;
  loopPlaying = true;
  loopPaused = false;
  document.getElementById('loopBar').classList.add('show');
  document.getElementById('loopCount').textContent = loopPlaylist.length;
  document.getElementById('loopPlayBtn').textContent = '⏸';
  document.getElementById('listSpeakStop').style.display = 'block';
  
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({ title: '日本語学習', artist: '列表朗读' });
    navigator.mediaSession.setActionHandler('play', () => toggleLoopPlay());
    navigator.mediaSession.setActionHandler('pause', () => toggleLoopPlay());
    navigator.mediaSession.setActionHandler('nexttrack', () => { loopIndex = (loopIndex + 1) % loopPlaylist.length; playLoopItem(); });
    navigator.mediaSession.setActionHandler('previoustrack', () => { loopIndex = (loopIndex - 1 + loopPlaylist.length) % loopPlaylist.length; playLoopItem(); });
  }
  playLoopItem();
}
// ===== MODE & CATEGORY SWITCHING =====
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const panelMap = { list: 'panelList', study: 'panelStudy', quiz: 'panelQuiz', stats: 'panelStats' };
  document.getElementById(panelMap[mode]).classList.add('active');

  document.getElementById('catTabs').style.display = mode === 'stats' ? 'none' : 'flex';
  document.getElementById('listToolbar').style.display = mode === 'list' ? 'flex' : 'none';

  if (mode === 'list') renderList();
  if (mode === 'study') { studyIndex = 0; renderStudyCard(); }
  if (mode === 'quiz') { startQuiz(); }
  if (mode === 'stats') renderStats();
}

function switchCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  if (currentMode === 'list') renderList();
  if (currentMode === 'study') { studyIndex = 0; renderStudyCard(); }
  if (currentMode === 'quiz') startQuiz();
}

// ===== LIST =====
let listPage = 1;
const PAGE_SIZE = 50;
let listFiltered = [];

function renderList() {
  const items = currentCat === 'mix' ? [].concat(
    DATA.nouns.map(it => ({...it, _cat: 'nouns'})),
    DATA.sentences.map(it => ({...it, _cat: 'sentences'}))
  ) : DATA[currentCat];
  const q = document.getElementById('searchInput').value.toLowerCase();
  listFiltered = q ? items.filter(it =>
    it.word.toLowerCase().includes(q) ||
    it.reading.includes(q) ||
    it.meaning.includes(q) ||
    (it.example && it.example.includes(q))
  ) : items;
  listPage = 1;
  renderListPage();
}

function renderListPage() {
  const totalPages = Math.ceil(listFiltered.length / PAGE_SIZE);
  const start = (listPage - 1) * PAGE_SIZE;
  const show = listFiltered.slice(start, start + PAGE_SIZE);

  const container = document.getElementById('listContainer');
  let html = '';
  for (const it of show) {
    const ex = it.example ? escHtml(it.example) : '';
    const itemCat = it._cat || currentCat;
    html += `<div class="list-item" data-word="${escHtml(it.word)}" data-example="${ex}" style="display:flex;align-items:center;position:relative">
      ${selectMode ? '<input type="checkbox" class="select-cb item-cb" data-cat="' + itemCat + '" data-id="' + it.id + '" ' + (loopSelected.has(itemCat + ':' + it.id) ? 'checked' : '') + ' style="margin-left:-4px">' : ''}
      <div class="list-num">${it.id}</div>
      <div class="list-body">
        <div class="list-word">${escHtml(it.word)}</div>
        <div class="list-reading">${escHtml(it.reading)}</div>
        <div class="list-meaning">${escHtml(it.meaning)}</div>
        ${it.example ? '<div class="list-example">' + escHtml(it.example) + (it.exampleCn ? '<br><span style="color:var(--accent)">' + escHtml(it.exampleCn) + '</span>' : '') + '</div>' : ''}
      </div>
      <button class="speak-btn">🔊</button>
      ${isMastered(it._cat || currentCat, it.id) ? '<div style="position:absolute;top:8px;right:8px;background:var(--accent);color:white;font-size:10px;padding:2px 8px;border-radius:10px">已掌握</div>' : '<div style="position:absolute;top:8px;right:8px;color:var(--text-secondary);font-size:10px">' + getItemCount(it._cat || currentCat, it.id) + '/50</div>'}
    </div>`;
  }
  if (listFiltered.length === 0) {
    html += `<div class="loading">未找到匹配结果</div>`;
  }
  // Pagination
  if (totalPages > 1) {
    html += `<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:20px 0">`;
    html += `<button class="pager-btn" onclick="goPage(-1)" ${listPage<=1?'disabled':''}>◀ 上一页</button>`;
    html += `<span style="font-size:14px;color:var(--text-secondary)">${listPage} / ${totalPages}（共${listFiltered.length}条）</span>`;
    html += `<button class="pager-btn" onclick="goPage(1)" ${listPage>=totalPages?'disabled':''}>下一页 ▶</button>`;
    html += `</div>`;
  }
  container.innerHTML = html;
}

// Event delegation for list items
document.getElementById('listContainer').addEventListener('click', function(e) {
  const cb = e.target.closest('.item-cb');
  if (cb) {
    e.stopPropagation();
    toggleSelectItem(cb.dataset.cat, cb.dataset.id, cb.checked);
    return;
  }
  const item = e.target.closest('.list-item');
  if (!item) return;
  speakWithExample(item.dataset.word, item.dataset.example);
});

function goPage(dir) {
  const totalPages = Math.ceil(listFiltered.length / PAGE_SIZE);
  listPage = Math.max(1, Math.min(totalPages, listPage + dir));
  renderListPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== STUDY =====
function renderStudyCard() {
  const items = getActiveItems(currentCat);
  if (!items.length) { document.getElementById('studyProgress').textContent = t('allMastered'); document.getElementById('cardFrontWord').textContent = '🎉'; document.getElementById('cardBackReading').textContent = ''; document.getElementById('cardBackMeaning').textContent = ''; document.getElementById('cardBackExample').innerHTML = ''; return; }
  if (studyIndex >= items.length) studyIndex = 0;
  const it = items[studyIndex];
  recordItemSeen(it._cat || currentCat, it.id);
  document.getElementById('studyProgress').textContent = `${studyIndex + 1} / ${items.length} (${t('remaining')})`;
  document.getElementById('cardFrontWord').textContent = it.word;
  document.getElementById('cardBackReading').textContent = it.reading;
  document.getElementById('cardBackMeaning').textContent = it.meaning;
  document.getElementById('cardBackExample').innerHTML = (it.example ? escHtml(it.example) : '') + (it.exampleCn ? '<br><span style="color:var(--accent);font-size:13px">' + escHtml(it.exampleCn) + '</span>' : '');
  document.getElementById('cardInner').classList.remove('flipped');
  recordStudy();
}
function flipCard() {
  document.getElementById('cardInner').classList.toggle('flipped');
}
function studyNav(dir) {
  const items = getActiveItems(currentCat);
  studyIndex = (studyIndex + dir + items.length) % items.length;
  renderStudyCard();
}
function speakCurrent() {
  const items = getActiveItems(currentCat);
  if (!items.length) return;
  const it = items[studyIndex];
  speakWithExample(it.word, it.example);
}

// ===== QUIZ =====
function startQuiz() {
  quizItems = [...getActiveItems(currentCat)].sort(() => Math.random() - 0.5);
  quizIndex = 0;
  renderQuiz();
}
function renderQuiz() {
  if (quizIndex >= quizItems.length) {
    quizIndex = 0;
    quizItems.sort(() => Math.random() - 0.5);
  }
  const it = quizItems[quizIndex];
  document.getElementById('quizProgress').textContent = `${quizIndex + 1} / ${quizItems.length}`;
  document.getElementById('quizWord').textContent = it.word;
  document.getElementById('quizReading').textContent = it.reading;
  document.getElementById('quizMeaning').textContent = it.meaning;
  document.getElementById('quizExample').innerHTML = (it.example ? escHtml(it.example) : '') + (it.exampleCn ? '<br><span style="color:var(--accent)">' + escHtml(it.exampleCn) + '</span>' : '');
  document.getElementById('quizAnswer').classList.remove('show');
  document.getElementById('btnShow').style.display = 'block';
  document.getElementById('quizActions').style.display = 'none';
  quizAnswered = false;
}
function showQuizAnswer() {
  document.getElementById('quizAnswer').classList.add('show');
  document.getElementById('btnShow').style.display = 'none';
  document.getElementById('quizActions').style.display = 'flex';
  quizAnswered = true;
}
function quizAnswer(correct) {
  const qit = quizItems[quizIndex];
  recordItemSeen(qit._cat || currentCat, qit.id);
  if (correct) delayItem(qit._cat || currentCat, qit.id, 1);
  recordQuiz(qit, correct);
  quizIndex++;
  renderQuiz();
}
function speakQuizCurrent() {
  const it = quizItems[quizIndex];
  speakWithExample(it.word, it.example);
}

// ===== STATS =====
function renderStats() {
  const stats = getStats();
  const today = todayKey();
  const todayData = stats[today] || { studied: 0, quizzed: 0, correct: 0, wrong: {} };

  // Summary cards
  let totalStudied = 0, totalQuizzed = 0, totalCorrect = 0;
  for (const d of Object.values(stats)) {
    totalStudied += d.studied || 0;
    totalQuizzed += d.quizzed || 0;
    totalCorrect += d.correct || 0;
  }
  // Study status based on last 7 days
  let weekTotal = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const dd = stats[key] || {};
    weekTotal += (dd.studied || 0) + (dd.quizzed || 0);
  }
  const dailyAvg = weekTotal / 7;
  let studyStatus;
  if (dailyAvg < 10) studyStatus = { emoji: '🦥', label: t('statusLazy'), color: '#e74c3c' };
  else if (dailyAvg < 30) studyStatus = { emoji: '🐢', label: t('statusOk'), color: '#e67e22' };
  else if (dailyAvg < 80) studyStatus = { emoji: '👍', label: t('statusGood'), color: 'var(--accent)' };
  else if (dailyAvg < 150) studyStatus = { emoji: '🔥', label: t('statusHard'), color: 'var(--primary)' };
  else studyStatus = { emoji: '⚠️', label: t('statusOver'), color: '#e74c3c' };

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num green">${todayData.studied}</div><div class="stat-label">${t('todayStudy')}</div></div>
    <div class="stat-card"><div class="stat-num orange">${todayData.quizzed}</div><div class="stat-label">${t('todayQuiz')}</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:18px;color:${studyStatus.color}">${studyStatus.emoji}</div><div class="stat-label">${studyStatus.label}</div></div>
    <div class="stat-card"><div class="stat-num orange">${Object.keys(stats).length}</div><div class="stat-label">${t('totalDays')}</div></div>
  `;

  // Last 7 days chart
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }
  let maxVal = 50; // minimum scale so small numbers don't appear full
  for (const d of days) {
    const dd = stats[d] || {};
    maxVal = Math.max(maxVal, (dd.studied || 0) + (dd.quizzed || 0));
  }
  let barsHtml = '';
  for (const d of days) {
    const dd = stats[d] || { studied: 0, quizzed: 0, correct: 0 };
    const s = dd.studied || 0;
    const q = dd.quizzed || 0;
    const sw = (s / maxVal * 100);
    const qw = (q / maxVal * 100);
    const label = d.slice(5);
    barsHtml += `<div class="chart-bar-row">
      <div class="chart-bar-label">${label}</div>
      <div class="chart-bar-track">
        <div class="chart-bar-fill-green" style="width:${sw}%"></div>
        <div class="chart-bar-fill-orange" style="width:${qw}%"></div>
      </div>
      <div class="chart-bar-value">${s + q}</div>
    </div>`;
  }
  barsHtml += '<div style="font-size:11px;color:var(--text-secondary);margin-top:8px">🟢 学习 &nbsp; 🟠 测试</div>';
  document.getElementById('chartBars').innerHTML = barsHtml;

  // Wrong words
  const wrongMap = {};
  for (const d of Object.values(stats)) {
    for (const [k, v] of Object.entries(d.wrong || {})) {
      wrongMap[k] = (wrongMap[k] || 0) + v;
    }
  }
  const wrongArr = Object.entries(wrongMap).sort((a, b) => b[1] - a[1]).slice(0, 20);
  let wrongHtml = '';
  if (wrongArr.length === 0) {
    wrongHtml = '<div style="color:var(--text-secondary);font-size:14px;text-align:center;padding:20px">' + t('noData') + '</div>';
  }
  for (const [key, count] of wrongArr) {
    const [cat, id] = key.split(':');
    const item = DATA[cat]?.find(it => it.id === parseInt(id));
    if (!item) continue;
    wrongHtml += `<div class="wrong-list-item">
      <span class="wrong-word">${escHtml(item.word)}</span>
      <span class="wrong-meaning">${escHtml(item.meaning)}</span>
      <span class="wrong-count">×${count}</span>
    </div>`;
  }
  document.getElementById('wrongList').innerHTML = wrongHtml;
}

function resetStats() {
  if (confirm("⚠️ 警告：这将清除所有设备上的全部学习数据！\n\n包括：学习进度、掌握记录、延迟复习计划\n\n此操作不可恢复，确定继续吗？")) {
    if (confirm("再次确认：真的要删除所有数据吗？")) {
      // Backup data before delete
      const backup = {
        id: userId,
        stats: localStats,
        counts: JSON.parse(localStorage.getItem('jp_item_counts') || '{}'),
        delays: JSON.parse(localStorage.getItem('jp_delays') || '{}'),
        deletedAt: new Date().toISOString()
      };
      db.ref('backups/' + userId + '/' + Date.now()).set(backup);
      // Clear local and cloud
      localStorage.removeItem('jp_stats');
      localStorage.removeItem('jp_item_counts');
      localStorage.removeItem('jp_delays');
      localStats = {}; localCounts = {}; syncToCloud();
      renderStats();
    }
  }
}

// ===== INIT =====
window.addEventListener('load', async () => {
  await loadData();
  const saved = localStorage.getItem('jp_user_id');
  if (saved) {
    userId = saved;
  } else {
    // Auto-generate a new ID
    userId = generateId();
    localStorage.setItem('jp_user_id', userId);
  }
  updateHeaderUser();
  updateProfileId();
  applyLang();
  // Pull latest from cloud
  db.ref('users/' + userId).once('value').then(snap => {
    if (snap.exists()) {
      const data = snap.val();
      localStats = data.stats || {};
      localCounts = data.counts || {};
      localStorage.setItem('jp_stats', JSON.stringify(localStats));
      localStorage.setItem('jp_item_counts', JSON.stringify(localCounts));
      localStorage.setItem('jp_delays', JSON.stringify(data.delays || {}));
    }
    renderList();
  }).catch(() => { renderList(); });
});

// Swipe support for study mode
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (currentMode !== 'study') return;
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 80) {
    studyNav(diff > 0 ? -1 : 1);
  }
});

// Keyboard support
document.addEventListener('keydown', e => {
  if (currentMode === 'study') {
    if (e.key === 'ArrowLeft') studyNav(-1);
    if (e.key === 'ArrowRight') studyNav(1);
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
  }
  if (currentMode === 'quiz') {
    if (e.key === ' ' && !quizAnswered) { e.preventDefault(); showQuizAnswer(); }
    if (quizAnswered && e.key === 'ArrowLeft') quizAnswer(true);
    if (quizAnswered && e.key === 'ArrowRight') quizAnswer(false);
  }
});
