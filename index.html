    {"word": "捨てようと思っていたのに、思い出があってなかなか捨てられません。", "reading": "すてようとおもっていたのに、おもいでがあってなかなかすてられません。", "meaning": "明明想扔掉的，因为有回忆怎么也扔不了。", "level": "N3", "id": 1140},
    {"word": "荷物を預けようとしたら、ロッカーが全部埋まっていました。", "reading": "にもつをあずけようとしたら、ろっかーがぜんぶうまっていました。", "meaning": "想寄存行李结果储物柜全满了。", "level": "N3", "id": 1141},
    {"word": "一人で運ぼうとしたら重すぎて、結局誰かに手伝ってもらいました。", "reading": "ひとりではこぼうとしたらおもすぎて、けっきょくだれかにてつだってもらいました。", "meaning": "一个人搬太重了，最后还是找人帮忙了。", "level": "N3", "id": 1142},
    {"word": "この道を通るたびに、学生時代のことを思い出します。", "reading": "このみちをとおるたびに、がくせいじだいのことをおもいだします。", "meaning": "每次路过这条路都会想起学生时代。", "level": "N3", "id": 1143},
    {"word": "信号を渡ろうとしたら急に変わって、走って渡りました。", "reading": "しんごうをわたろうとしたらきゅうにかわって、はしってわたりました。", "meaning": "正要过马路信号灯突然变了，只好跑着过去。", "level": "N3", "id": 1144},
    {"word": "戻ろうとしたけど、もう遅すぎて引き返せませんでした。", "reading": "もどろうとしたけど、もうおそすぎてひきかえせませんでした。", "meaning": "想回头但已经太晚了回不去了。", "level": "N3", "id": 1145},
    {"word": "空港に向かっている途中で、パスポートを忘れたことに気づきました。", "reading": "くうこうにむかっているとちゅうで、ぱすぽーとをわすれたことにきづきました。", "meaning": "去机场的路上发现忘带护照了。", "level": "N3", "id": 1146},
    {"word": "逃げたい気持ちは分かるけど、ここで逃げたら後悔するよ。", "reading": "にげたいきもちはわかるけど、ここでにげたらこうかいするよ。", "meaning": "想逃的心情我理解，但现在逃了以后会后悔的。", "level": "N3", "id": 1147},
    {"word": "夢を追い続けるのは大変だけど、諦めたくないんです。", "reading": "ゆめをおいつづけるのはたいへんだけど、あきらめたくないんです。", "meaning": "追逐梦想虽然很辛苦，但不想放弃。", "level": "N3", "id": 1148},
    {"word": "電話がなかなかつながらなくて、三十分もかけ直しました。", "reading": "でんわがなかなかつながらなくて、さんじゅっぷんもかけなおしました。", "meaning": "电话一直打不通，打了三十分钟才接上。", "level": "N3", "id": 1149},
    {"word": "自分の気持ちを伝えるのが苦手で、いつも後悔しています。", "reading": "じぶんのきもちをつたえるのがにがてで、いつもこうかいしています。", "meaning": "不擅长表达自己的感受，总是事后后悔。", "level": "N3", "id": 1150},
    {"word": "間に合わないかと思ったけど、ギリギリ間に合ってほっとしました。", "reading": "まにあわないかとおもったけど、ぎりぎりまにあってほっとしました。", "meaning": "以为赶不上了，结果刚好赶上了松了口气。", "level": "N3", "id": 1151},
    {"word": "電車が遅れたせいで、大事な約束に遅れてしまいました。", "reading": "でんしゃがおくれたせいで、だいじなやくそくにおくれてしまいました。", "meaning": "因为电车晚点，重要的约定也迟到了。", "level": "N3", "id": 1152},
    {"word": "友達に紹介してもらった店が、想像以上に美味しかったです。", "reading": "ともだちにしょうかいしてもらったみせが、そうぞういじょうにおいしかったです。", "meaning": "朋友介绍的店比想象中好吃多了。", "level": "N3", "id": 1153},
    {"word": "予約しておかないと入れない店なので、早めに予約しました。", "reading": "よやくしておかないとはいれないみせなので、はやめによやくしました。", "meaning": "不预约进不去的店，所以提前订了。", "level": "N3", "id": 1154},
    {"word": "注文したものと違うものが来たけど、言い出せなくて食べてしまいました。", "reading": "ちゅうもんしたものとちがうものがきたけど、いいだせなくてたべてしまいました。", "meaning": "点的和上的不一样，但说不出口就吃了。", "level": "N3", "id": 1155},
    {"word": "このサービスを利用すれば、もっと効率的にできますよ。", "reading": "このさーびすをりようすれば、もっとこうりつてきにできますよ。", "meaning": "用这个服务的话可以更高效哦。", "level": "N3", "id": 1156},
    {"word": "連絡しようと思っているうちに、一ヶ月も経ってしまいました。", "reading": "れんらくしようとおもっているうちに、いっかげつもたってしまいました。", "meaning": "想着要联系结果一个月就过去了。", "level": "N3", "id": 1157},
    {"word": "時間が全然足りなくて、最後は適当にマークしてしまいました。", "reading": "じかんがぜんぜんたりなくて、さいごはてきとうにまーくしてしまいました。", "meaning": "时间完全不够，最后随便涂了答题卡。", "level": "N3", "id": 1158},
    {"word": "カレーを作りすぎて余ったから、冷凍して明日も食べることにしました。", "reading": "かれーをつくりすぎてあまったから、れいとうしてあしたもたべることにしました。", "meaning": "咖喱做太多了吃不完，冻起来明天接着吃。", "level": "N3", "id": 1159},
    {"word": "説明したつもりだったけど、伝わっていなかったみたいです。", "reading": "せつめいしたつもりだったけど、つたわっていなかったみたいです。", "meaning": "以为解释清楚了，好像没传达到位。", "level": "N3", "id": 1160},
    {"word": "心配しすぎても仕方ないと分かっているけど、つい心配してしまいます。", "reading": "しんぱいしすぎてもしかたないとわかっているけど、ついしんぱいしてしまいます。", "meaning": "明知担心也没用，还是忍不住担心。", "level": "N3", "id": 1161},
    {"word": "緊張しすぎて、何を話したか全然覚えていません。", "reading": "きんちょうしすぎて、なにをはなしたかぜんぜんおぼえていません。", "meaning": "太紧张了，完全不记得说了什么。", "level": "N3", "id": 1162},
    {"word": "時間が足りなくて、最後の問題まで解けませんでした。", "reading": "じかんがたりなくて、さいごのもんだいまでとけませんでした。", "meaning": "时间不够，最后一题没做完。", "level": "N3", "id": 1163},
    {"word": "この靴はサイズは合っているけど、デザインがちょっと好みじゃないです。", "reading": "このくつはさいずはあっているけど、でざいんがちょっとこのみじゃないです。", "meaning": "这双鞋尺码合适，但款式不太喜欢。", "level": "N3", "id": 1164},
    {"word": "その服すごく似合っているよ、買って正解だったね。", "reading": "そのふくすごくにあっているよ、かってせいかいだったね。", "meaning": "那件衣服超适合你，买对了。", "level": "N3", "id": 1165},
    {"word": "この時間は混むと分かっていたのに、来てしまいました。", "reading": "このじかんはこむとわかっていたのに、きてしまいました。", "meaning": "明知道这个时间会很挤还是来了。", "level": "N3", "id": 1166},
    {"word": "お腹が空きすぎて、集中力がなくなってきました。", "reading": "おなかがすきすぎて、しゅうちゅうりょくがなくなってきました。", "meaning": "肚子太饿了，注意力都没了。", "level": "N3", "id": 1167},
    {"word": "痩せたいと思いながらも、夜中にアイスを食べてしまいます。", "reading": "やせたいとおもいながらも、よなかにあいすをたべてしまいます。", "meaning": "嘴上说着想瘦，半夜还是吃了冰淇淋。", "level": "N3", "id": 1168},
    {"word": "暑すぎて死にそうだったけど、アイスを食べたら生き返りました。", "reading": "あつすぎてしにそうだったけど、あいすをたべたらいきかえりました。", "meaning": "最近觉得活出自己才是最重要的。", "level": "N3", "id": 1169},
    {"word": "この町で生まれ育ったので、ここ以外に住むことは考えられません。", "reading": "このまちでうまれそだったので、ここいがいにすむことはかんがえられません。", "meaning": "热得要死，但吃了冰淇淋就活过来了。", "level": "N3", "id": 1170},
    {"word": "子供を育てながら仕事を続けるのは、想像以上に大変です。", "reading": "こどもをそだてながらしごとをつづけるのは、そうぞういじょうにたいへんです。", "meaning": "在这个城镇出生长大，从没想过住在别的地方。", "level": "N3", "id": 1171},
    {"word": "名前を間違えて呼んでしまって、すごく気まずかったです。", "reading": "なまえをまちがえてよんでしまって、すごくきまずかったです。", "meaning": "刚开始不习惯，但习惯了就没什么大不了的。", "level": "N3", "id": 1172},
    {"word": "迷惑をかけたくないから、なかなか人に頼れないんです。", "reading": "めいわくをかけたくないから、なかなかひとにたよれないんです。", "meaning": "叫错了名字，超级尴尬。", "level": "N3", "id": 1173},
    {"word": "自分には関係ないと思っていたけど、実は深く関係していました。", "reading": "じぶんにはかんけいないとおもっていたけど、じつはふかくかんけいしていました。", "meaning": "因为不想给别人添麻烦，所以很难向人求助。", "level": "N3", "id": 1174},
    {"word": "努力しているのに結果が出ないのが、一番つらいです。", "reading": "どりょくしているのにけっかがでないのが、いちばんつらいです。", "meaning": "提醒了多少次也不改，因为本人不觉得有问题。", "level": "N3", "id": 1175},
    {"word": "集中しようとしても、隣の人の話し声が気になって集中できません。", "reading": "しゅうちゅうしようとしても、となりのひとのはなしごえがきになってしゅうちゅうできません。", "meaning": "明明在努力却没有成果，这最痛苦了。", "level": "N3", "id": 1176},
    {"word": "やっと完成したと思ったのに、ミスが見つかってやり直しです。", "reading": "やっとかんせいしたとおもったのに、みすがみつかってやりなおしです。", "meaning": "想集中精力但旁边有人说话没法集中。", "level": "N3", "id": 1177},
    {"word": "予定より一時間遅れて到着して、迎えに来てくれた人に申し訳なかったです。", "reading": "よていよりいちじかんおくれてとうちゃくして、むかえにきてくれたひとにもうしわけなかったです。", "meaning": "出发前一刻找不到票了，慌得不行。", "level": "N3", "id": 1178},
    {"word": "卒業してから十年経つけど、あの頃の友達とはまだ連絡を取っています。", "reading": "そつぎょうしてからじゅうねんたつけど、あのころのともだちとはまだれんらくをとっています。", "meaning": "比预定晚了一小时到，对来接我的人很抱歉。", "level": "N3", "id": 1179},
    {"word": "結婚したいけど、まず相手を見つけないと始まりませんよね。", "reading": "けっこんしたいけど、まずあいてをみつけないとはじまりませんよね。", "meaning": "工作之后才深刻体会到学生时代有多自由。", "level": "N3", "id": 1180},
    {"word": "こんなに美味しい店が近所に存在していたなんて、今まで知りませんでした。", "reading": "こんなにおいしいみせがきんじょにそんざいしていたなんて、いままでしりませんでした。", "meaning": "听到退役的消息时很震惊，但支持新的挑战。", "level": "N3", "id": 1181},
    {"word": "夢を実現するためには、まず小さな一歩を踏み出すことが大事です。", "reading": "ゆめをじつげんするためには、まずちいさないっぽをふみだすことがだいじです。", "meaning": "发现了新爱好之后每天都变得开心了。", "level": "N3", "id": 1182},
    {"word": "連絡先を交換したのに、結局一度も連絡しないまま終わりました。", "reading": "れんらくさきをこうかんしたのに、けっきょくいちども れんらくしないままおわりました。", "meaning": "能冷静应对突发状况的人，由衷地佩服。", "level": "N3", "id": 1183},
    {"word": "彼の代わりができる人は誰もいないと思っていたけど、意外と何とかなりました。", "reading": "かれのかわりができるひとはだれもいないとおもっていたけど、いがいとなんとかなりました。", "meaning": "AI翻译虽然方便，但细微的语感有时会偏差。", "level": "N3", "id": 1184},
    {"word": "雨が一週間も続いて、気分がどんどん沈んでいきます。", "reading": "あめがいっしゅうかんもつづいて、きぶんがどんどんしずんでいきます。", "meaning": "以为没人能替代他，但意外地还是撑过来了。", "level": "N3", "id": 1185},
    {"word": "何もしないで過ごす休日が、実は一番贅沢なのかもしれません。", "reading": "なにもしないですごすきゅうじつが、じつはいちばんぜいたくなのかもしれません。", "meaning": "做完所有工作后的啤酒是最好喝的。", "level": "N3", "id": 1186},
    {"word": "日本で暮らしてみて初めて分かったことがたくさんあります。", "reading": "にほんでくらしてみてはじめてわかったことがたくさんあります。", "meaning": "什么都不做的休息日，可能其实是最奢侈的。", "level": "N3", "id": 1187},
    {"word": "一年を振り返ってみると、思ったより成長できたなと思います。", "reading": "いちねんをふりかえってみると、おもったよりせいちょうできたなとおもいます。", "meaning": "直面问题虽然很难，但逃避的话迟早也会追上来。", "level": "N3", "id": 1188},
    {"word": "この壁を乗り越えられたら、きっともっと強くなれるはずです。", "reading": "このかべをのりこえられたら、きっともっとつよくなれるはずです。", "meaning": "回顾这一年，觉得自己成长了不少。", "level": "N3", "id": 1189},
    {"word": "このお店、雰囲気がよくて何回も来ちゃうんだよね。", "reading": "このおみせ、ふんいきがよくてなんかいもきちゃうんだよね。", "meaning": "这家店氛围很好，我都来了好多次了。", "level": "N3", "id": 1190},
    {"word": "給料日前だから、手持ちのお金が少ないんだ。", "reading": "きゅうりょうびまえだから、てもちのおかねがすくないんだ。", "meaning": "快到发工资的日子了，手头的钱不多。", "level": "N3", "id": 1191},
    {"word": "最近の動画って短い方がバズりやすいよね。", "reading": "さいきんのどうがってみじかいほうがバズりやすいよね。", "meaning": "最近短视频更容易火呢。", "level": "N3", "id": 1192},
    {"word": "あの木の幹、すごく太くて何百年も経ってるらしいよ。", "reading": "あのきのみき、すごくふとくてなんびゃくねんもたってるらしいよ。", "meaning": "那棵树的树干特别粗，好像已经有几百年了。", "level": "N3", "id": 1193},
    {"word": "今日めちゃくちゃ暑くない？もう夏みたいだよ。", "reading": "きょうめちゃくちゃあつくない？もうなつみたいだよ。", "meaning": "今天超热的吧？简直跟夏天一样。", "level": "N3", "id": 1194},
    {"word": "今朝は寒すぎて布団から出られなかったよ。", "reading": "けさはさむすぎてふとんからでられなかったよ。", "meaning": "今天早上太冷了，根本起不来。", "level": "N3", "id": 1195},
    {"word": "冷たいビールが飲みたくなる季節になってきたね。", "reading": "つめたいびーるがのみたくなるきせつになってきたね。", "meaning": "到了想喝冰啤酒的季节了呢。", "level": "N3", "id": 1196},
    {"word": "今日は風が暖かくて、散歩日和だね。", "reading": "きょうはかぜがあたたかくて、さんぽびよりだね。", "meaning": "今天风很暖和，是散步的好天气。", "level": "N3", "id": 1197},
    {"word": "夜になると涼しくなってきて、だいぶ過ごしやすいね。", "reading": "よるになるとすずしくなってきて、だいぶすごしやすいね。", "meaning": "到了晚上变凉快了，舒服多了。", "level": "N3", "id": 1198},
    {"word": "彼女はいつも明るくて、一緒にいると元気をもらえるんだ。", "reading": "かのじょはいつもあかるくて、いっしょにいるとげんきをもらえるんだ。", "meaning": "她总是很开朗，和她在一起会被感染到正能量。", "level": "N3", "id": 1199},
    {"word": "この道、夜になると暗いから一人で歩くのはちょっと怖いよ。", "reading": "このみち、よるになるとくらいからひとりであるくのはちょっとこわいよ。", "meaning": "这条路晚上很暗，一个人走有点害怕。", "level": "N3", "id": 1200},
    {"word": "白いTシャツってすぐ汚れるから困るんだよね。", "reading": "しろいてぃーしゃつってすぐよごれるからこまるんだよね。", "meaning": "白T恤很容易脏，真头疼。", "level": "N3", "id": 1201},
    {"word": "黒い服ばっかり着てると、なんか地味に見えちゃうかな。", "reading": "くろいふくばっかりきてると、なんかじみにみえちゃうかな。", "meaning": "老穿黑衣服的话，会不会看起来太朴素了。", "level": "N3", "id": 1202},
    {"word": "顔が赤いけど、もしかして熱あるんじゃない？", "reading": "かおがあかいけど、もしかしてねつあるんじゃない？", "meaning": "脸好红，是不是发烧了？", "level": "N3", "id": 1203},
    {"word": "今日の空、すごく青いね。どこか遠くに行きたくなるよ。", "reading": "きょうのそら、すごくあおいね。どこかとおくにいきたくなるよ。", "meaning": "今天的天空好蓝啊，让人想去远方。", "level": "N3", "id": 1204},
    {"word": "お月様が丸くて、今夜は満月かな。", "reading": "おつきさまがまるくて、こんやはまんげつかな。", "meaning": "月亮圆圆的，今晚是满月吧。", "level": "N3", "id": 1205},
    {"word": "昨日の飲み会で変なこと言っちゃって、まずいなと思った。", "reading": "きのうののみかいでへんなこといっちゃって、まずいなとおもった。", "meaning": "昨天聚会上说了奇怪的话，觉得糟了。", "level": "N3", "id": 1206},
    {"word": "このケーキ、見た目はシンプルだけど甘さがちょうどいいね。", "reading": "このけーき、みためはしんぷるだけどあまさがちょうどいいね。", "meaning": "这个蛋糕看着朴素，但甜度刚刚好。", "level": "N3", "id": 1207},
    {"word": "この麻婆豆腐、思ったより辛くて汗が止まらない。", "reading": "このまーぼーどうふ、おもったよりからくてあせがとまらない。", "meaning": "这个麻婆豆腐比想象中辣，汗停不下来。", "level": "N3", "id": 1208},
    {"word": "大人になってからブラックコーヒーの苦さが好きになった。", "reading": "おとなになってからぶらっくこーひーのにがさがすきになった。", "meaning": "长大以后开始喜欢黑咖啡的苦味了。", "level": "N3", "id": 1209},
    {"word": "このみかん、ちょっと酸っぱいけど、それがまたいいんだよね。", "reading": "このみかん、ちょっとすっぱいけど、それがまたいいんだよね。", "meaning": "这个橘子有点酸，但那也是它的好处。", "level": "N3", "id": 1210},
    {"word": "このお味噌汁、ちょっとしょっぱくない？お湯足そうか。", "reading": "このおみそしる、ちょっとしょっぱくない？おゆたそうか。", "meaning": "这个味增汤是不是有点咸？加点热水吧。", "level": "N3", "id": 1211},
    {"word": "このカレー、味が濃いからご飯多めにしたほうがいいよ。", "reading": "このかれー、あじがこいからごはんおおめにしたほうがいいよ。", "meaning": "这个咖喱味道很浓，多盛点米饭比较好。", "level": "N3", "id": 1212},
    {"word": "隣の部屋の人、夜中までうるさくてぜんぜん眠れなかった。", "reading": "となりのへやのひと、よなかまでうるさくてぜんぜんねむれなかった。", "meaning": "隔壁的人吵到半夜，完全睡不着。", "level": "N3", "id": 1213},
    {"word": "この図書館は静かで集中できるから、よくここで勉強してる。", "reading": "このとしょかんはしずかでしゅうちゅうできるから、よくここでべんきょうしてる。", "meaning": "这个图书馆很安静能集中精神，所以我经常在这里学习。", "level": "N3", "id": 1214},
    {"word": "最近仕事が忙しすぎて、友達と全然会えてないんだよね。", "reading": "さいきんしごとがいそがしすぎて、ともだちとぜんぜんあえてないんだよね。", "meaning": "最近工作太忙了，完全没法见朋友。", "level": "N3", "id": 1215},
    {"word": "今日は暇だし、久しぶりに映画でも観に行かない？", "reading": "きょうはひまだし、ひさしぶりにえいがでもみにいかない？", "meaning": "今天有空，好久没看了，去看场电影怎么样？", "level": "N3", "id": 1216},
    {"word": "あの人の話し方が面白くて、つい笑っちゃうんだよね。", "reading": "あのひとのはなしかたがおもしろくて、ついわらっちゃうんだよね。", "meaning": "那个人说话太有趣了，忍不住就笑了。", "level": "N3", "id": 1217},
    {"word": "この映画、評判良かったけど、正直つまらなかった。", "reading": "このえいが、ひょうばんよかったけど、しょうじきつまらなかった。", "meaning": "这部电影口碑不错，但说实话很无聊。", "level": "N3", "id": 1218},
    {"word": "プレゼント気に入ってもらえて、本当に嬉しい。", "reading": "ぷれぜんときにいってもらえて、ほんとうにうれしい。", "meaning": "礼物你能喜欢，我真的很高兴。", "level": "N3", "id": 1219},
    {"word": "ずっと一緒にいた猫がいなくなって、悲しくてたまらない。", "reading": "ずっといっしょにいたねこがいなくなって、かなしくてたまらない。", "meaning": "一直在一起的猫不见了，难过得不得了。", "level": "N3", "id": 1220},
    {"word": "一人暮らしを始めてから、夜になると寂しくなることがある。", "reading": "ひとりぐらしをはじめてから、よるになるとさびしくなることがある。", "meaning": "开始一个人住以后，到了晚上有时会觉得寂寞。", "level": "N3", "id": 1221},
    {"word": "あの映画、怖すぎて夜トイレに行けなくなった。", "reading": "あのえいが、こわすぎてよるといれにいけなくなった。", "meaning": "那部电影太恐怖了，晚上都不敢去厕所了。", "level": "N3", "id": 1222},
    {"word": "みんなの前で転んじゃって、恥ずかしくて顔が真っ赤になった。", "reading": "みんなのまえでころんじゃって、はずかしくてかおがまっかになった。", "meaning": "在大家面前摔倒了，害羞得脸通红。", "level": "N3", "id": 1223},
    {"word": "来月からヨーロッパ旅行？いいなあ、羨ましい！", "reading": "らいげつからよーろっぱりょこう？いいなあ、うらやましい！", "meaning": "下个月去欧洲旅行？好好啊，真羡慕！", "level": "N3", "id": 1224},
    {"word": "昨日夜更かししたから、朝から眠くてしょうがない。", "reading": "きのうよふかししたから、あさからねむくてしょうがない。", "meaning": "昨天熬夜了，从早上开始就困得不行。", "level": "N3", "id": 1225},
    {"word": "朝起きたら首が痛くて、たぶん寝違えたんだと思う。", "reading": "あさおきたらくびがいたくて、たぶんねちがえたんだとおもう。", "meaning": "早上起来脖子好疼，估计是落枕了。", "level": "N3", "id": 1226},
    {"word": "蚊に刺されたところが痒くて、掻かないようにするのが大変。", "reading": "かにさされたところがかゆくて、かかないようにするのがたいへん。", "meaning": "被蚊子咬的地方好痒，忍着不挠太难了。", "level": "N3", "id": 1227},
    {"word": "今日なんか体がだるくて、何もやる気が出ない。", "reading": "きょうなんかからだがだるくて、なにもやるきがでない。", "meaning": "今天不知道为什么浑身没劲，什么都不想做。", "level": "N3", "id": 1228},
    {"word": "あの先輩は誰にでも優しくて、みんなに好かれてるよ。", "reading": "あのせんぱいはだれにでもやさしくて、みんなにすかれてるよ。", "meaning": "那个前辈对谁都很温柔，大家都喜欢他。", "level": "N3", "id": 1229},
    {"word": "この本は説明が易しくて、初心者でもわかりやすいよ。", "reading": "このほんはせつめいがやさしくて、しょしんしゃでもわかりやすいよ。", "meaning": "这本书解释很简单易懂，初学者也能看明白。", "level": "N3", "id": 1230},
    {"word": "自分が正しいと思っても、相手の意見もちゃんと聞いたほうがいいよ。", "reading": "じぶんがただしいとおもっても、あいてのいけんもちゃんときいたほうがいいよ。", "meaning": "就算觉得自己是对的，也应该好好听听对方的意见。", "level": "N3", "id": 1231},
    {"word": "こんな時間にお客さんが来るなんて、珍しいね。", "reading": "こんなじかんにおきゃくさんがくるなんて、めずらしいね。", "meaning": "这个时间有客人来，真少见啊。", "level": "N3", "id": 1232},
    {"word": "初めて富士山を見たとき、素晴らしい景色に感動した。", "reading": "はじめてふじさんをみたとき、すばらしいけしきにかんどうした。", "meaning": "第一次看到富士山的时候，被那壮丽的景色感动了。", "level": "N3", "id": 1233},
    {"word": "桜が満開で、本当に美しい景色だったよ。", "reading": "さくらがまんかいで、ほんとうにうつくしいけしきだったよ。", "meaning": "樱花盛开，真的是很美的景色。", "level": "N3", "id": 1234},
    {"word": "新しいスーツ着たら、めちゃくちゃ格好いいじゃん。", "reading": "あたらしいスーツきたら、めちゃくちゃかっこいいじゃん。", "meaning": "穿上新西装，超帅的嘛。", "level": "N3", "id": 1235},
    {"word": "この冷蔵庫、何か臭くない？中に何か腐ってるかも。", "reading": "このれいぞうこ、なにかくさくない？なかになにかくさってるかも。", "meaning": "这冰箱是不是有点臭？里面可能有什么东西坏了。", "level": "N3", "id": 1236},
    {"word": "夜道は一人で歩くと危ないから、タクシーで帰りな。", "reading": "よみちはひとりであるくとあぶないから、タクシーでかえりな。", "meaning": "晚上一个人走夜路很危险，坐出租车回去吧。", "level": "N3", "id": 1237},
    {"word": "このラーメン屋、行列すごいけど、味は本当にすごいよ。", "reading": "このラーメンや、ぎょうれつすごいけど、あじはほんとうにすごいよ。", "meaning": "这家拉面店排队很长，但味道真的很厉害。", "level": "N3", "id": 1238},
    {"word": "今月お金使いすぎて、やばい、来週まで持たないかも。", "reading": "こんげつおかねつかいすぎて、やばい、らいしゅうまでもたないかも。", "meaning": "这个月钱花太多了，糟了，可能撑不到下周。", "level": "N3", "id": 1239},
    {"word": "風邪がひどくて、三日間ずっと寝込んでた。", "reading": "かぜがひどくて、みっかかんずっとねこんでた。", "meaning": "感冒很严重，连续躺了三天。", "level": "N3", "id": 1240},
    {"word": "毎日お弁当作ってるの？偉いね、私にはとても無理だわ。", "reading": "まいにちおべんとうつくってるの？えらいね、わたしにはとてもむりだわ。", "meaning": "你每天都做便当？真了不起，我可做不到。", "level": "N3", "id": 1241},
    {"word": "うちの犬、賢いから一回教えただけでお手を覚えたよ。", "reading": "うちのいぬ、かしこいからいっかいおしえただけでおてをおぼえたよ。", "meaning": "我家的狗很聪明，教了一次就学会握手了。", "level": "N3", "id": 1242},
    {"word": "ごめん、私ちょっと鈍いから、もう一回説明してくれる？", "reading": "ごめん、わたしちょっとにぶいから、もういっかいせつめいしてくれる？", "meaning": "抱歉，我有点迟钝，能再解释一遍吗？", "level": "N3", "id": 1243},
    {"word": "今年のチームはディフェンスが強いから、優勝できるかも。", "reading": "ことしのチームはディフェンスがつよいから、ゆうしょうできるかも。", "meaning": "今年的队伍防守很强，也许能夺冠。", "level": "N3", "id": 1244},
    {"word": "お酒に弱いから、一杯で顔が真っ赤になるんだよね。", "reading": "おさけによわいから、いっぱいでかおがまっかになるんだよね。", "meaning": "我不太能喝酒，一杯脸就通红了。", "level": "N3", "id": 1245},
    {"word": "この映画、テーマが深いから、もう一回見たくなった。", "reading": "このえいが、テーマがふかいから、もういっかいみたくなった。", "meaning": "这部电影主题很深刻，让人想再看一遍。", "level": "N3", "id": 1246},
    {"word": "まだ知識が浅いので、もっと勉強しないといけません。", "reading": "まだちしきがあさいので、もっとべんきょうしないといけません。", "meaning": "知识还很浅薄，必须更加努力学习。", "level": "N3", "id": 1247},
    {"word": "忙しいのに手伝ってくれて、本当にありがたいです。", "reading": "いそがしいのにてつだってくれて、ほんとうにありがたいです。", "meaning": "你那么忙还来帮忙，真的很感激。", "level": "N3", "id": 1248},
    {"word": "書類の手続き、めんどくさいけど、やらないと進まないしな。", "reading": "しょるいのてつづき、めんどくさいけど、やらないとすすまないしな。", "meaning": "办手续虽然很麻烦，但不做就没法往下走。", "level": "N3", "id": 1249},
    {"word": "虫がいっぱいついてるの見ちゃって、気持ち悪かった。", "reading": "むしがいっぱいついてるのみちゃって、きもちわるかった。", "meaning": "看到上面全是虫子，好恶心。", "level": "N3", "id": 1250},
    {"word": "温泉に入った瞬間、めちゃくちゃ気持ちいい！", "reading": "おんせんにはいったしゅんかん、めちゃくちゃきもちいい！", "meaning": "泡进温泉的那一刻，超舒服！", "level": "N3", "id": 1251},
    {"word": "このカフェ、落ち着いてて居心地がいいから、つい長居しちゃう。", "reading": "このカフェ、おちついてていごこちがいいから、ついながいしちゃう。", "meaning": "这家咖啡厅很安静，待着很舒服，不知不觉就待久了。", "level": "N3", "id": 1252},
    {"word": "週末の商店街は賑やかで、歩いてるだけで楽しいよ。", "reading": "しゅうまつのしょうてんがいはにぎやかで、あるいてるだけでたのしいよ。", "meaning": "周末的商店街很热闹，光是走走就很开心。", "level": "N3", "id": 1253},
    {"word": "この店、テレビで紹介されてから有名になったらしいよ。", "reading": "このみせ、テレビでしょうかいされてからゆうめいになったらしいよ。", "meaning": "这家店好像是上了电视之后出名的。", "level": "N3", "id": 1254},
    {"word": "道に迷ったとき、親切なおばさんが駅まで案内してくれた。", "reading": "みちにまよったとき、しんせつなおばさんがえきまであんないしてくれた。", "meaning": "迷路的时候，一位亲切的阿姨带我到了车站。", "level": "N3", "id": 1255},
    {"word": "うちの弟は真面目だから、毎日欠かさず勉強してるよ。", "reading": "うちのおとうとはまじめだから、まいにちかかさずべんきょうしてるよ。", "meaning": "我弟弟很认真，每天都坚持学习。", "level": "N3", "id": 1256},
    {"word": "あの子は素直だから、注意するとすぐ直してくれる。", "reading": "あのこはすなおだから、ちゅういするとすぐなおしてくれる。", "meaning": "那孩子很坦诚，一提醒马上就改。", "level": "N3", "id": 1257},
    {"word": "準備は十分だから、あとは本番を待つだけだね。", "reading": "じゅんびはじゅうぶんだから、あとはほんばんをまつだけだね。", "meaning": "准备已经很充分了，接下来就等正式上场了。", "level": "N3", "id": 1258},
    {"word": "この書類の手続き、思ったより複雑で時間がかかった。", "reading": "このしょるいのてつづき、おもったよりふくざつでじかんがかかった。", "meaning": "这个文件的手续比想象中复杂，花了不少时间。", "level": "N3", "id": 1259},
    {"word": "この地域は夜でも安全だから、一人で歩いても大丈夫だよ。", "reading": "このちいきはよるでもあんぜんだから、ひとりであるいてもだいじょうぶだよ。", "meaning": "这个地区晚上也很安全，一个人走也没问题。", "level": "N3", "id": 1260},
    {"word": "台風の日に外に出るのは危険だから、家にいたほうがいい。", "reading": "たいふうのひにそとにでるのはきけんだから、いえにいたほうがいい。", "meaning": "台风天出门很危险，还是待在家里比较好。", "level": "N3", "id": 1261},
    {"word": "大学生になったら、自由な時間が増えると思ってたのに。", "reading": "だいがくせいになったら、じゆうなじかんがふえるとおもってたのに。", "meaning": "本以为上了大学自由时间会变多的。", "level": "N3", "id": 1262},
    {"word": "平和な世界になるように、みんなで努力しなきゃね。", "reading": "へいわなせかいになるように、みんなでどりょくしなきゃね。", "meaning": "为了实现和平的世界，大家都要努力啊。", "level": "N3", "id": 1263},
    {"word": "健康のために、なるべく野菜を多く食べるようにしてる。", "reading": "けんこうのために、なるべくやさいをおおくたべるようにしてる。", "meaning": "为了健康，我尽量多吃蔬菜。", "level": "N3", "id": 1264},
    {"word": "毎日好きなことができて、本当に幸せだなって思う。", "reading": "まいにちすきなことができて、ほんとうにしあわせだなっておもう。", "meaning": "每天都能做喜欢的事，真的觉得很幸福。", "level": "N3", "id": 1265},
    {"word": "せっかくの旅行なのに雨が続いて、不幸なことが重なった。", "reading": "せっかくのりょこうなのにあめがつづいて、ふこうなことがかさなった。", "meaning": "难得的旅行却一直下雨，不幸的事接连发生。", "level": "N3", "id": 1266},
    {"word": "楽しみにしてたライブが中止になって、本当に残念だった。", "reading": "たのしみにしてたらいぶがちゅうしになって、ほんとうにざんねんだった。", "meaning": "一直期待的演唱会取消了，真的太遗憾了。", "level": "N3", "id": 1267},
    {"word": "明日の面接、ちゃんとできるか心配で眠れなかった。", "reading": "あしたのめんせつ、ちゃんとできるかしんぱいでねむれなかった。", "meaning": "担心明天面试能不能好好发挥，都睡不着了。", "level": "N3", "id": 1268},
    {"word": "今週中に全部終わらせるのは、さすがに無理だと思う。", "reading": "こんしゅうちゅうにぜんぶおわらせるのは、さすがにむりだとおもう。", "meaning": "这周之内全部完成，怎么想都不太可能吧。", "level": "N3", "id": 1269},
    {"word": "来月なら予定を調整できるから、参加は可能だと思う。", "reading": "らいげつならよていをちょうせいできるから、さんかはかのうだとおもう。", "meaning": "下个月的话可以调整安排，应该能参加。", "level": "N3", "id": 1270},
    {"word": "一日で日本語をマスターするのは不可能だよ。", "reading": "いちにちでにほんごをますたーするのはふかのうだよ。", "meaning": "一天之内掌握日语是不可能的。", "level": "N3", "id": 1271},
    {"word": "彼は料理が得意で、何でもおいしく作れるんだよ。", "reading": "かれはりょうりがとくいで、なんでもおいしくつくれるんだよ。", "meaning": "他擅长做饭，什么都能做得很好吃。", "level": "N3", "id": 1272},
    {"word": "朝早く起きるのが苦手で、いつも目覚ましを何個もセットしてる。", "reading": "あさはやくおきるのがにがてで、いつもめざましをなんこもせっとしてる。", "meaning": "我不擅长早起，总是设好几个闹钟。", "level": "N3", "id": 1273},
    {"word": "さすがプロだね、説明が上手で一回で分かったよ。", "reading": "さすがぷろだね、せつめいがじょうずでいっかいでわかったよ。", "meaning": "不愧是专业的，解释得很到位，一下就明白了。", "level": "N3", "id": 1274},
    {"word": "字が下手で、自分で書いたメモが読めないときがある。", "reading": "じがへたで、じぶんでかいためもがよめないときがある。", "meaning": "字写得太差，有时候连自己写的笔记都看不懂。", "level": "N3", "id": 1275},
    {"word": "適当に返事してたら、後で大変なことになったよ。", "reading": "てきとうにへんじしてたら、あとでたいへんなことになったよ。", "meaning": "随便回答的话，后来就出大事了。", "level": "N3", "id": 1276},
    {"word": "このデータが正確かどうか、もう一回確認してもらえる？", "reading": "このでーたがせいかくかどうか、もういっかいかくにんしてもらえる？", "meaning": "能帮我再确认一下这个数据准不准确吗？", "level": "N3", "id": 1277},
    {"word": "これは個人的な意見だけど、今のままでいいと思う。", "reading": "これはこじんてきないけんだけど、いまのままでいいとおもう。", "meaning": "这只是我个人的看法，我觉得维持现状就好。", "level": "N3", "id": 1278},
    {"word": "基本的なマナーさえ守れば、あとは自由にやっていいよ。", "reading": "きほんてきなまなーさえまもれば、あとはじゆうにやっていいよ。", "meaning": "只要遵守基本的礼仪，其他的随意就好。", "level": "N3", "id": 1279},
    {"word": "急な話で申し訳ないんだけど、明日の会議、時間変えてもいい？", "reading": "きゅうなはなしでもうしわけないんだけど、あしたのかいぎ、じかんかえてもいい？", "meaning": "很抱歉这么突然，明天的会议可以改个时间吗？", "level": "N3", "id": 1280},
    {"word": "確かにそうだね、言われてみればその通りだわ。", "reading": "たしかにそうだね、いわれてみればそのとおりだわ。", "meaning": "确实是那样呢，你这么一说还真是。", "level": "N3", "id": 1281},
    {"word": "こんな立派な家に住んでるなんて、すごいなあ。", "reading": "こんなりっぱないえにすんでるなんて、すごいなあ。", "meaning": "居然住在这么气派的房子里，太厉害了。", "level": "N3", "id": 1282},
    {"word": "このカフェ、雰囲気が素敵だね。また来たいな。", "reading": "このかふぇ、ふんいきがすてきだね。またきたいな。", "meaning": "这家咖啡店氛围真棒啊，下次还想来。", "level": "N3", "id": 1283},
    {"word": "最近お隣さんから変な音が聞こえるんだけど、気のせいかな。", "reading": "さいきんおとなりさんからへんなおとがきこえるんだけど、きのせいかな。", "meaning": "最近从邻居家传来奇怪的声音，是我多想了吗。", "level": "N3", "id": 1284},
    {"word": "不思議なことに、あの二人って会ったこともないのに趣味が全く同じなんだよ。", "reading": "ふしぎなことに、あのふたりってあったこともないのにしゅみがまったくおなじなんだよ。", "meaning": "不可思议的是，那两个人明明没见过面，爱好却完全一样。", "level": "N3", "id": 1285},
    {"word": "明日の天気、微妙だから、傘持っていった方がいいかも。", "reading": "あしたのてんき、びみょうだから、かさもっていったほうがいいかも。", "meaning": "明天天气不太好说，带把伞比较好吧。", "level": "N3", "id": 1286},
    {"word": "たまには贅沢なランチもいいよね、自分へのご褒美ってことで。", "reading": "たまにはぜいたくならんちもいいよね、じぶんへのごほうびってことで。", "meaning": "偶尔吃顿奢侈的午餐也不错吧，就当奖励自己了。", "level": "N3", "id": 1287},
    {"word": "服装は地味だけど、実はすごくおしゃれな人なんだよ、あの人。", "reading": "ふくそうはじみだけど、じつはすごくおしゃれなひとなんだよ、あのひと。", "meaning": "穿着虽然朴素，但那个人其实很会打扮的。", "level": "N3", "id": 1288},
    {"word": "今日のネイル、派手じゃない？何かいいことあった？", "reading": "きょうのねいる、はでじゃない？なにかいいことあった？", "meaning": "你今天的美甲好花哨啊，有什么好事吗？", "level": "N3", "id": 1289},
    {"word": "この魚、今朝獲れたばかりで新鮮だから、刺身にしよう。", "reading": "このさかな、けさとれたばかりでしんせんだから、さしみにしよう。", "meaning": "这鱼是今早刚捕的很新鲜，做成生鱼片吧。", "level": "N3", "id": 1290},
    {"word": "このホテルはいつ来ても清潔で気持ちがいいね。", "reading": "このほてるはいつきてもせいけつできもちがいいね。", "meaning": "这家酒店每次来都很干净，让人很舒服。", "level": "N3", "id": 1291},
    {"word": "緊急の連絡が入ったから、ちょっと先に失礼するね。", "reading": "きんきゅうのれんらくがはいったから、ちょっとさきにしつれいするね。", "meaning": "收到紧急联络了，我先走一步哈。", "level": "N3", "id": 1292},
    {"word": "このドラマの演技、すごく自然で、本当の会話みたいだった。", "reading": "このどらまのえんぎ、すごくしぜんで、ほんとうのかいわみたいだった。", "meaning": "这部剧的演技非常自然，就像真正的对话一样。", "level": "N3", "id": 1293},
    {"word": "毎日練習してたんだから、上手くなるのは当然だよ。", "reading": "まいにちれんしゅうしてたんだから、うまくなるのはとうぜんだよ。", "meaning": "每天都在练习，变厉害是理所当然的。", "level": "N3", "id": 1294},
    {"word": "あの人が転職するなんて意外だったなあ。ずっとあの会社にいると思ってた。", "reading": "あのひとがてんしょくするなんていがいだったなあ。ずっとあのかいしゃにいるとおもってた。", "meaning": "没想到那个人会跳槽，我一直以为他会待在那家公司。", "level": "N3", "id": 1295},
    {"word": "最近この辺り、新しいカフェができて、かなり盛んになってきたね。", "reading": "さいきんこのあたり、あたらしいかふぇができて、かなりさかんになってきたね。", "meaning": "最近这附近开了好多新咖啡店，变得很热闹了呢。", "level": "N3", "id": 1296},
    {"word": "うちの父、本当に頑固で、一度決めたら絶対に変えないんだよ。", "reading": "うちのちち、ほんとうにがんこで、いちどきめたらぜったいにかえないんだよ。", "meaning": "我爸真的很固执，一旦决定了的事绝对不改。", "level": "N3", "id": 1297},
    {"word": "彼女って器用だよね、何でもサッと作っちゃうんだもん。", "reading": "かのじょってきようだよね、なんでもさっとつくっちゃうんだもん。", "meaning": "她真的很手巧啊，什么都能很快做出来。", "level": "N3", "id": 1298},
    {"word": "俺、不器用だから、プレゼントの包装とかうまくできないんだよね。", "reading": "おれ、ぶきようだから、ぷれぜんとのほうそうとかうまくできないんだよね。", "meaning": "我手比较笨，包装礼物之类的做不好。", "level": "N3", "id": 1299},
    {"word": "今朝は風が爽やかで、散歩するのにぴったりだね。", "reading": "けさはかぜがさわやかで、さんぽするのにぴったりだね。", "meaning": "今天早上风很清爽，正适合散步呢。", "level": "N3", "id": 1300},
    {"word": "この辺りは自然が豊かだから、週末にキャンプに来る人が多いよ。", "reading": "このあたりはしぜんがゆたかだから、しゅうまつにきゃんぷにくるひとがおおいよ。", "meaning": "这一带自然资源丰富，周末来露营的人很多。", "level": "N3", "id": 1301},
    {"word": "子供の頃は貧しかったけど、家族みんな仲が良かった。", "reading": "こどものころはまずしかったけど、かぞくみんななかがよかった。", "meaning": "小时候虽然穷，但一家人感情都很好。", "level": "N3", "id": 1302},
    {"word": "あの子、最近ちょっと乱暴な言葉遣いが増えてきて心配だな。", "reading": "あのこ、さいきんちょっとらんぼうなことばづかいがふえてきてしんぱいだな。", "meaning": "那孩子最近说话越来越粗暴了，有点担心。", "level": "N3", "id": 1303},
    {"word": "彼はどんな時でも冷静に判断できるから、頼りになる。", "reading": "かれはどんなときでもれいせいにはんだんできるから、たよりになる。", "meaning": "他不管什么时候都能冷静判断，很靠得住。", "level": "N3", "id": 1304},
    {"word": "最近ギターに夢中で、毎晩練習してるんだ。", "reading": "さいきんぎたーにむちゅうで、まいばんれんしゅうしてるんだ。", "meaning": "我最近迷上吉他了，每天晚上都在练。", "level": "N3", "id": 1305},
    {"word": "毎日お弁当を作るのは正直面倒だけど、節約にはなる。", "reading": "まいにちおべんとうをつくるのはしょうじきめんどうだけど、せつやくにはなる。", "meaning": "每天做便当说实话挺麻烦的，但确实能省钱。", "level": "N3", "id": 1306},
    {"word": "セール中につい買いすぎて、結局無駄な出費が増えちゃった。", "reading": "せーるちゅうについかいすぎて、けっきょくむだなしゅっぴがふえちゃった。", "meaning": "打折的时候不小心买多了，结果多了不少浪费的开销。", "level": "N3", "id": 1307},
    {"word": "この天気だと、うちのチームにはかなり不利な試合になりそうだ。", "reading": "このてんきだと、うちのちーむにはかなりふりなしあいになりそうだ。", "meaning": "这种天气的话，对我们队来说会是一场相当不利的比赛。", "level": "N3", "id": 1308},
    {"word": "新たな気持ちで、来月からまた頑張ろうと思う。", "reading": "あらたなきもちで、らいげつからまたがんばろうとおもう。", "meaning": "我想以全新的心情，从下个月开始重新努力。", "level": "N3", "id": 1309},
    {"word": "あの人、見た目はちょっと怖いけど、話してみたらまともな人だったよ。", "reading": "あのひと、みためはちょっとこわいけど、はなしてみたらまともなひとだったよ。", "meaning": "那个人看着有点吓人，但聊了之后发现是个挺正经的人。", "level": "N3", "id": 1310},
    {"id": 1311, "word": "小麦のアレルギーがあるんですけど、大丈夫ですか。", "reading": "こむぎのアレルギーがあるんですけど、だいじょうぶですか。", "meaning": "我对小麦过敏，没问题吗？", "level": "N2"},
    {"id": 1312, "word": "人身事故で電車が止まっています。", "reading": "じんしんじこででんしゃがとまっています。", "meaning": "因为人身事故电车停了。", "level": "N2"},
    {"id": 1313, "word": "振替輸送を利用します。", "reading": "ふりかえゆそうをりようします。", "meaning": "利用替代交通。", "level": "N2"},
    {"id": 1314, "word": "露天風呂はありますか。", "reading": "ろてんぶろはありますか。", "meaning": "有露天浴池吗？", "level": "N2"},
    {"id": 1315, "word": "ご検討をお願いします。", "reading": "ごけんとうをおねがいします。", "meaning": "请您考虑一下。", "level": "N2"},
    {"id": 1316, "word": "前向きに検討いたします。", "reading": "まえむきにけんとういたします。", "meaning": "我们会积极考虑。", "level": "N2"},
    {"id": 1317, "word": "折り返しお電話いたします。", "reading": "おりかえしおでんわいたします。", "meaning": "我会回电话给您。", "level": "N2"},
    {"id": 1318, "word": "ご不明な点がございましたら。", "reading": "ごふめいなてんがございましたら。", "meaning": "如果有不明白的地方。", "level": "N2"},
    {"id": 1319, "word": "お気軽にお問い合わせください。", "reading": "おきがるにおといあわせください。", "meaning": "请随时咨询。", "level": "N2"},
    {"id": 1320, "word": "引き継ぎをお願いします。", "reading": "ひきつぎをおねがいします。", "meaning": "请做好交接。", "level": "N2"},
    {"id": 1321, "word": "内定をもらいました。", "reading": "ないていをもらいました。", "meaning": "拿到了内定。", "level": "N2"},
    {"id": 1322, "word": "至急対応をお願いします。", "reading": "しきゅうたいおうをおねがいします。", "meaning": "请紧急处理。", "level": "N2"},
    {"id": 1323, "word": "お手数をおかけします。", "reading": "おてすうをおかけします。", "meaning": "给您添麻烦了。", "level": "N2"},
    {"id": 1324, "word": "ご迷惑をおかけして申し訳ありません。", "reading": "ごめいわくをおかけしてもうしわけありません。", "meaning": "非常抱歉给您添麻烦了。", "level": "N2"},
    {"id": 1325, "word": "確認が取れ次第、ご連絡します。", "reading": "かくにんがとれしだい、ごれんらくします。", "meaning": "确认后会联系您。", "level": "N2"},
    {"id": 1326, "word": "今後ともよろしくお願いいたします。", "reading": "こんごともよろしくおねがいいたします。", "meaning": "今后也请多关照。", "level": "N2"},
    {"id": 1327, "word": "忘年会の幹事を頼まれました。", "reading": "ぼうねんかいのかんじをたのまれました。", "meaning": "被拜托做忘年会的组织者了。", "level": "N2"},
    {"id": 1328, "word": "ワークライフバランスが大事です。", "reading": "ワークライフバランスがだいじです。", "meaning": "工作生活平衡很重要。", "level": "N2"},
    {"id": 1329, "word": "裏切られた気持ちです。", "reading": "うらぎられたきもちです。", "meaning": "感觉被背叛了。", "level": "N2"},
    {"id": 1330, "word": "一人で抱え込まないで。", "reading": "ひとりでかかえこまないで。", "meaning": "别一个人扛着。", "level": "N2"},
    {"id": 1331, "word": "悪気はなかったんです。", "reading": "わるぎはなかったんです。", "meaning": "我不是故意的。", "level": "N2"},
    {"id": 1332, "word": "お互いの気持ちを尊重しましょう。", "reading": "おたがいのきもちをそんちょうしましょう。", "meaning": "互相尊重彼此的感受吧。", "level": "N2"},
    {"id": 1333, "word": "本音を言ってほしいです。", "reading": "ほんねをいってほしいです。", "meaning": "希望你说真心话。", "level": "N2"},
    {"id": 1334, "word": "建前ばかり言わないで。", "reading": "たてまえばかりいわないで。", "meaning": "别只说客套话。", "level": "N2"},
    {"id": 1335, "word": "空気を読んでください。", "reading": "くうきをよんでください。", "meaning": "请看看气氛。", "level": "N2"},
    {"id": 1336, "word": "余計なお世話です。", "reading": "よけいなおせわです。", "meaning": "多管闲事。", "level": "N2"},
    {"id": 1337, "word": "むかつきます。", "reading": "むかつきます。", "meaning": "气死了。", "level": "N2"},
    {"id": 1338, "word": "イライラします。", "reading": "イライラします。", "meaning": "烦躁。", "level": "N2"},
    {"id": 1339, "word": "最近ついていないです。", "reading": "さいきんついていないです。", "meaning": "最近很不顺。", "level": "N2"},
    {"id": 1340, "word": "わくわくしています。", "reading": "わくわくしています。", "meaning": "好兴奋。", "level": "N2"},
    {"id": 1341, "word": "懐かしいですね。", "reading": "なつかしいですね。", "meaning": "好怀念啊。", "level": "N2"},
    {"id": 1342, "word": "後悔しています。", "reading": "こうかいしています。", "meaning": "后悔了。", "level": "N2"},
    {"id": 1343, "word": "もっと早く言えばよかった。", "reading": "もっとはやくいえばよかった。", "meaning": "要是早点说就好了。", "level": "N2"},
    {"id": 1344, "word": "努力は裏切らないよ。", "reading": "どりょくはうらぎらないよ。", "meaning": "努力不会白费的。", "level": "N2"},
    {"id": 1345, "word": "ありのままでいいんだよ。", "reading": "ありのままでいいんだよ。", "meaning": "做自己就好。", "level": "N2"},
    {"id": 1346, "word": "完璧じゃなくていいんだよ。", "reading": "かんぺきじゃなくていいんだよ。", "meaning": "不用完美也没关系。", "level": "N2"},
    {"id": 1347, "word": "早寝早起きを心がけています。", "reading": "はやねはやおきをこころがけています。", "meaning": "尽量早睡早起。", "level": "N2"},
    {"id": 1348, "word": "ストレスをためないようにしています。", "reading": "ストレスをためないようにしています。", "meaning": "尽量不积累压力。", "level": "N2"},
    {"id": 1349, "word": "規則正しい生活が大事です。", "reading": "きそくただしいせいかつがだいじです。", "meaning": "规律的生活很重要。", "level": "N2"},
    {"id": 1350, "word": "お酒はほどほどにしてください。", "reading": "おさけはほどほどにしてください。", "meaning": "请适量饮酒。", "level": "N2"},
    {"id": 1351, "word": "知るかよ。", "reading": "しるかよ。", "meaning": "我怎么知道。", "level": "N2"},
    {"id": 1352, "word": "黙れ！", "reading": "だまれ！", "meaning": "闭嘴！", "level": "N2"},
    {"id": 1353, "word": "ふざけるな！", "reading": "ふざけるな！", "meaning": "别开玩笑！", "level": "N2"},
    {"id": 1354, "word": "いい加減にしろ！", "reading": "いいかげんにしろ！", "meaning": "适可而止！", "level": "N2"},
    {"id": 1355, "word": "お前、何様のつもりだ？", "reading": "おまえ、なにさまのつもりだ？", "meaning": "你以为你是谁？", "level": "N2"},
    {"id": 1356, "word": "裏切るなよ。", "reading": "うらぎるなよ。", "meaning": "别背叛。", "level": "N2"},
    {"id": 1357, "word": "負けるもんか。", "reading": "まけるもんか。", "meaning": "怎么能输。", "level": "N2"},
    {"id": 1358, "word": "覚悟しろ。", "reading": "かくごしろ。", "meaning": "做好觉悟。", "level": "N2"},
    {"id": 1359, "word": "本気を出せ。", "reading": "ほんきをだせ。", "meaning": "拿出真本事来。", "level": "N2"},
    {"id": 1360, "word": "手加減はしない。", "reading": "てかげんはしない。", "meaning": "不会手下留情。", "level": "N2"},
    {"id": 1361, "word": "恩に着る。", "reading": "おんにきる。", "meaning": "承你的情。", "level": "N2"},
    {"id": 1362, "word": "借りは返す。", "reading": "かりはかえす。", "meaning": "欠的会还。", "level": "N2"},
    {"id": 1363, "word": "これからが本番だ。", "reading": "これからがほんばんだ。", "meaning": "从现在起才是正式的。", "level": "N2"},
    {"id": 1364, "word": "ちくしょう！", "reading": "ちくしょう！", "meaning": "可恶！", "level": "N2"},
    {"id": 1365, "word": "よっしゃー！", "reading": "よっしゃー！", "meaning": "太棒了！", "level": "N2"},
    {"id": 1366, "word": "ぎりぎりだった。", "reading": "ぎりぎりだった。", "meaning": "好险。", "level": "N2"},
    {"id": 1367, "word": "奇跡だ。", "reading": "きせきだ。", "meaning": "是奇迹。", "level": "N2"},
    {"id": 1368, "word": "ついてないな。", "reading": "ついてないな。", "meaning": "真倒霉。", "level": "N2"},
    {"id": 1369, "word": "嫌な予感がする。", "reading": "いやなよかんがする。", "meaning": "有不好的预感。", "level": "N2"},
    {"id": 1370, "word": "勘違いするな。", "reading": "かんちがいするな。", "meaning": "别搞错了。", "level": "N2"},
    {"id": 1371, "word": "不在票が入っていました。", "reading": "ふざいひょうがはいっていました。", "meaning": "有不在配送单。", "level": "N2"},
    {"id": 1372, "word": "家計簿をつけています。", "reading": "かけいぼをつけています。", "meaning": "在记账。", "level": "N2"},
    {"id": 1373, "word": "今月はちょっとピンチです。", "reading": "こんげつはちょっとピンチです。", "meaning": "这个月有点紧张。", "level": "N2"},
    {"id": 1374, "word": "クレジットカードの請求が来ました。", "reading": "クレジットカードのせいきゅうがきました。", "meaning": "信用卡账单来了。", "level": "N2"},
    {"id": 1375, "word": "確定申告をしなければなりません。", "reading": "かくていしんこくをしなければなりません。", "meaning": "得报税。", "level": "N2"},
    {"id": 1376, "word": "御朱印を集めています。", "reading": "ごしゅいんをあつめています。", "meaning": "在收集朱印。", "level": "N2"},
    {"id": 1377, "word": "ストレス発散になりました。", "reading": "ストレスはっさんになりました。", "meaning": "释放了压力。", "level": "N2"},
    {"id": 1378, "word": "おっしゃる通りです。", "reading": "おっしゃるとおりです。", "meaning": "您说得对。", "level": "N2"},
    {"id": 1379, "word": "それは一理ありますね。", "reading": "それはいちりありますね。", "meaning": "那有一定道理。", "level": "N2"},
    {"id": 1380, "word": "要するに。", "reading": "ようするに。", "meaning": "总而言之。", "level": "N2"},
    {"id": 1381, "word": "そもそも。", "reading": "そもそも。", "meaning": "本来/从根本上说。", "level": "N2"},
    {"id": 1382, "word": "ちなみに。", "reading": "ちなみに。", "meaning": "顺便说一下。", "level": "N2"},
    {"id": 1383, "word": "それにしても。", "reading": "それにしても。", "meaning": "即便如此。", "level": "N2"},
    {"id": 1384, "word": "それはさておき。", "reading": "それはさておき。", "meaning": "那先放一边。", "level": "N2"},
    {"id": 1385, "word": "一方で。", "reading": "いっぽうで。", "meaning": "另一方面。", "level": "N2"},
    {"id": 1386, "word": "結局のところ。", "reading": "けっきょくのところ。", "meaning": "说到底。", "level": "N2"},
    {"id": 1387, "word": "必ずしもそうとは限りません。", "reading": "かならずしもそうとはかぎりません。", "meaning": "未必如此。", "level": "N2"},
    {"id": 1388, "word": "客観的に見ると。", "reading": "きゃっかんてきにみると。", "meaning": "客观来看。", "level": "N2"},
    {"id": 1389, "word": "前提として。", "reading": "ぜんていとして。", "meaning": "作为前提。", "level": "N2"},
    {"id": 1390, "word": "矛盾していませんか。", "reading": "むじゅんしていませんか。", "meaning": "不矛盾吗？", "level": "N2"},
    {"id": 1391, "word": "データに基づいて話しましょう。", "reading": "データにもとづいてはなしましょう。", "meaning": "基于数据来讨论吧。", "level": "N2"},
    {"id": 1392, "word": "問題の本質は何ですか。", "reading": "もんだいのほんしつはなんですか。", "meaning": "问题的本质是什么？", "level": "N2"},
    {"id": 1393, "word": "メリットとデメリットを比較しましょう。", "reading": "メリットとデメリットをひかくしましょう。", "meaning": "比较一下优缺点吧。", "level": "N2"},
    {"id": 1394, "word": "リスクを考慮する必要があります。", "reading": "リスクをこうりょするひつようがあります。", "meaning": "需要考虑风险。", "level": "N2"},
    {"id": 1395, "word": "長期的な視点で見ると。", "reading": "ちょうきてきなしてんでみると。", "meaning": "从长远的角度来看。", "level": "N2"},
    {"id": 1396, "word": "妥協点を見つけましょう。", "reading": "だきょうてんをみつけましょう。", "meaning": "找到折中方案吧。", "level": "N2"},
    {"id": 1397, "word": "お互い譲り合いましょう。", "reading": "おたがいゆずりあいましょう。", "meaning": "互相让步吧。", "level": "N2"},
    {"id": 1398, "word": "今後の方針を決めましょう。", "reading": "こんごのほうしんをきめましょう。", "meaning": "决定今后的方针吧。", "level": "N2"},
    {"id": 1399, "word": "常識的に考えて。", "reading": "じょうしきてきにかんがえて。", "meaning": "从常识来想。", "level": "N2"},
    {"id": 1400, "word": "社会的な影響を考えるべきです。", "reading": "しゃかいてきなえいきょうをかんがえるべきです。", "meaning": "应该考虑社会影响。", "level": "N2"},
    {"id": 1401, "word": "時代の流れに合わせるべきです。", "reading": "じだいのながれにあわせるべきです。", "meaning": "应该顺应时代潮流。", "level": "N2"},
    {"id": 1402, "word": "伝統を大切にすべきです。", "reading": "でんとうをたいせつにすべきです。", "meaning": "应该重视传统。", "level": "N2"},
    {"id": 1403, "word": "多様性を尊重しましょう。", "reading": "たようせいをそんちょうしましょう。", "meaning": "尊重多样性吧。", "level": "N2"},
    {"id": 1404, "word": "いろいろな角度から考えるべきです。", "reading": "いろいろなかくどからかんがえるべきです。", "meaning": "应该从各种角度思考。", "level": "N2"},
    {"id": 1405, "word": "この問題は深刻です。", "reading": "このもんだいはしんこくです。", "meaning": "这个问题很严重。", "level": "N2"},
    {"id": 1406, "word": "改善の余地があります。", "reading": "かいぜんのよちがあります。", "meaning": "有改善的余地。", "level": "N2"},
    {"id": 1407, "word": "可能性は無限大です。", "reading": "かのうせいはむげんだいです。", "meaning": "可能性是无限的。", "level": "N2"},
    {"id": 1408, "word": "まだまだ未熟です。", "reading": "まだまだみじゅくです。", "meaning": "还很不成熟。", "level": "N2"},
    {"id": 1409, "word": "これからの人生に乾杯。", "reading": "これからのじんせいにかんぱい。", "meaning": "为今后的人生干杯。", "level": "N2"},
    {"id": 1410, "word": "バズっていますね。", "reading": "バズっていますね。", "meaning": "火了呢。", "level": "N2"},
    {"id": 1411, "word": "猛暑日が続いています。", "reading": "もうしょびがつづいています。", "meaning": "连续酷暑天。", "level": "N2"},
    {"id": 1412, "word": "道路が凍結しています。", "reading": "どうろがとうけつしています。", "meaning": "路面结冰了。", "level": "N2"},
    {"id": 1413, "word": "乾燥しているので加湿器をつけました。", "reading": "かんそうしているのでかしつきをつけました。", "meaning": "因为干燥所以开了加湿器。", "level": "N2"},
    {"id": 1414, "word": "衣替えの季節ですね。", "reading": "ころもがえのきせつですね。", "meaning": "到了换季的时候了。", "level": "N2"},
    {"id": 1415, "word": "冬物をクリーニングに出します。", "reading": "ふゆものをクリーニングにだします。", "meaning": "把冬装送去干洗。", "level": "N2"},
    {"id": 1416, "word": "タメ口で話してもいいですか。", "reading": "タメぐちではなしてもいいですか。", "meaning": "可以用平语说话吗？", "level": "N2"},
    {"id": 1417, "word": "継続は力なりです。", "reading": "けいぞくはちからなりです。", "meaning": "坚持就是力量。", "level": "N2"},
    {"id": 1418, "word": "少子高齢化が問題になっています。", "reading": "しょうしこうれいかがもんだいになっています。", "meaning": "少子老龄化成了问题。", "level": "N2"},
    {"id": 1419, "word": "環境問題について考えるべきです。", "reading": "かんきょうもんだいについてかんがえるべきです。", "meaning": "应该思考环境问题。", "level": "N2"},
    {"id": 1420, "word": "異文化理解が大切です。", "reading": "いぶんかりかいがたいせつです。", "meaning": "理解不同文化很重要。", "level": "N2"},
    {"id": 1421, "word": "お互いの文化を尊重しましょう。", "reading": "おたがいのぶんかをそんちょうしましょう。", "meaning": "互相尊重各自的文化吧。", "level": "N2"},
    {"id": 1422, "word": "グローバルな視野を持ちましょう。", "reading": "グローバルなしやをもちましょう。", "meaning": "拥有全球视野吧。", "level": "N2"},
    {"id": 1423, "word": "せっかく早く起きたのに、電車が遅れて遅刻しました。", "reading": "せっかくはやくおきたのに、でんしゃがおくれてちこくしました。", "meaning": "难得早起了，结果电车晚点迟到了。", "level": "N2"},
    {"id": 1424, "word": "嫌だと思いつつも、断れなくて引き受けてしまいました。", "reading": "いやだとおもいつつも、ことわれなくてひきうけてしまいました。", "meaning": "虽然觉得不想做，但没法拒绝就接下了。", "level": "N2"},
    {"id": 1425, "word": "反対する人もいたけど、最終的にはみんな賛成してくれました。", "reading": "はんたいするひともいたけど、さいしゅうてきにはみんなさんせいしてくれました。", "meaning": "虽然也有人反对，但最终大家都赞成了。", "level": "N2"},
    {"id": 1426, "word": "約束したのに来ないなんて、ひどいと思いませんか。", "reading": "やくそくしたのにこないなんて、ひどいとおもいませんか。", "meaning": "明明约好了却不来，你不觉得过分吗？", "level": "N2"},
    {"id": 1427, "word": "天気予報では晴れるはずだったのに、急に雨が降ってきました。", "reading": "てんきよほうではれるはずだったのに、きゅうにあめがふってきました。", "meaning": "天气预报说会晴的，结果突然下起雨来了。", "level": "N2"},
    {"id": 1428, "word": "文句を言いたい気持ちは分かりますが、ここは我慢しましょう。", "reading": "もんくをいいたいきもちはわかりますが、ここはがまんしましょう。", "meaning": "想抱怨的心情我理解，但这里忍一忍吧。", "level": "N2"},
    {"id": 1429, "word": "予算がオーバーしてしまったため、計画を見直す必要があります。", "reading": "よさんがオーバーしてしまったため、けいかくをみなおすひつようがあります。", "meaning": "因为超预算了，有必要重新审视计划。", "level": "N2"},
    {"id": 1430, "word": "渋滞に巻き込まれて、空港に着くのがギリギリでした。", "reading": "じゅうたいにまきこまれて、くうこうにつくのがギリギリでした。", "meaning": "被堵在路上，到机场的时候差点来不及。", "level": "N2"},
    {"id": 1431, "word": "説明書を読まずに組み立てたから、部品が余ってしまいました。", "reading": "せつめいしょをよまずにくみたてたから、ぶひんがあまってしまいました。", "meaning": "因为没看说明书就组装了，零件多出来了。", "level": "N2"},
    {"id": 1432, "word": "もっと早く知っていれば、あんな失敗はしなかったのに。", "reading": "もっとはやくしっていれば、あんなしっぱいはしなかったのに。", "meaning": "如果早点知道的话，就不会那样失败了。", "level": "N2"},
    {"id": 1433, "word": "駅を出ると、目の前にきれいな桜並木が広がっていました。", "reading": "えきをでると、めのまえにきれいなさくらなみきがひろがっていました。", "meaning": "一出车站，眼前就是美丽的樱花大道。", "level": "N2"},
    {"id": 1434, "word": "万が一に備えて、保険に入っておいた方がいいですよ。", "reading": "まんがいちにそなえて、ほけんにはいっておいたほうがいいですよ。", "meaning": "以防万一，还是买个保险比较好。", "level": "N2"},
    {"id": 1435, "word": "電話してくれれば、迎えに行ったのに。", "reading": "でんわしてくれれば、むかえにいったのに。", "meaning": "你要是打电话的话我就去接你了。", "level": "N2"},
    {"id": 1436, "word": "彼は仕事ができる上に、人柄もいいので、みんなに好かれています。", "reading": "かれはしごとができるうえに、ひとがらもいいので、みんなにすかれています。", "meaning": "他工作能力强而且人品也好，大家都喜欢他。", "level": "N2"},
    {"id": 1437, "word": "ドアを開けたとたん、猫が外に飛び出していきました。", "reading": "ドアをあけたとたん、ねこがそとにとびだしていきました。", "meaning": "一开门猫就跑出去了。", "level": "N2"},
    {"id": 1438, "word": "若いうちにいろいろな経験をしておいた方がいいですよ。", "reading": "わかいうちにいろいろなけいけんをしておいたほうがいいですよ。", "meaning": "趁年轻多积累各种经验比较好。", "level": "N2"},
    {"id": 1439, "word": "彼、最近仕事を辞めたっぽいんだけど、本当かな。", "reading": "かれ、さいきんしごとをやめたっぽいんだけど、ほんとうかな。", "meaning": "他最近好像辞职了，不知道是不是真的。", "level": "N2"},
    {"id": 1440, "word": "話を聞く限りでは、かなり深刻な問題のようです。", "reading": "はなしをきくかぎりでは、かなりしんこくなもんだいのようです。", "meaning": "听起来好像是相当严重的问题。", "level": "N2"},
    {"id": 1441, "word": "歳を取るにつれて、健康のありがたさが分かるようになりました。", "reading": "としをとるにつれて、けんこうのありがたさがわかるようになりました。", "meaning": "随着年龄增长，越来越能体会健康的可贵。", "level": "N2"},
    {"id": 1442, "word": "子供が大きくなるにつれて、教育費がどんどん増えていきます。", "reading": "こどもがおおきくなるにつれて、きょういくひがどんどんふえていきます。", "meaning": "随着孩子长大，教育费越来越多。", "level": "N2"},
    {"id": 1443, "word": "上司に飲み会に付き合わされて、帰りが遅くなりました。", "reading": "じょうしにのみかいにつきあわされて、かえりがおそくなりました。", "meaning": "被上司拉去喝酒，回去晚了。", "level": "N2"},
    {"id": 1444, "word": "親に心配させたくないから、辛くても笑顔でいます。", "reading": "おやにしんぱいさせたくないから、つらくてもえがおでいます。", "meaning": "不想让父母担心，所以再辛苦也笑着面对。", "level": "N2"},
    {"id": 1445, "word": "あの人ほど努力している人を、私は見たことがありません。", "reading": "あのひとほどどりょくしているひとを、わたしはみたことがありません。", "meaning": "我没见过像那个人那么努力的人。", "level": "N2"},
    {"id": 1446, "word": "若い頃より、今の方が人生を楽しめている気がします。", "reading": "わかいころより、いまのほうがじんせいをたのしめているきがします。", "meaning": "比起年轻时，感觉现在更能享受人生。", "level": "N2"},
    {"id": 1447, "word": "子供のように無邪気に笑える人が、うらやましいです。", "reading": "こどものようにむじゃきにわらえるひとが、うらやましいです。", "meaning": "好羡慕能像孩子一样天真地笑的人。", "level": "N2"},
    {"id": 1448, "word": "嵐のような一日がやっと終わりました。", "reading": "あらしのようないちにちがやっとおわりました。", "meaning": "像暴风雨一样的一天终于结束了。", "level": "N2"},
    {"id": 1449, "word": "どんなに辛くても、諦めなければ必ず道は開けると信じています。", "reading": "どんなにつらくても、あきらめなければかならずみちはひらけるとしんじています。", "meaning": "无论多辛苦，只要不放弃一定会有出路的，我相信。", "level": "N2"},
    {"id": 1450, "word": "お忙しいところ恐れ入りますが、少々お時間をいただけますか。", "reading": "おいそがしいところおそれいりますが、しょうしょうおじかんをいただけますか。", "meaning": "百忙之中打扰您了，能占用您一点时间吗？", "level": "N2"},
    {"id": 1451, "word": "言いたいことは分かるんですが、もう少し相手の気持ちを考えてから発言した方がいいと思います。", "reading": "いいたいことはわかるんですが、もうすこしあいてのきもちをかんがえてからはつげんしたほうがいいとおもいます。", "meaning": "你想说什么我明白，但最好再多考虑一下对方的感受再发言。", "level": "N2"},
    {"id": 1452, "word": "忙しくて自分の時間が全然取れないのが、最近の一番の悩みです。", "reading": "いそがしくてじぶんのじかんがぜんぜんとれないのが、さいきんのいちばんのなやみです。", "meaning": "忙得完全没有自己的时间，是最近最大的烦恼。", "level": "N2"},
    {"id": 1453, "word": "一人暮らしを始めてから、親のありがたさが身にしみて分かりました。", "reading": "ひとりぐらしをはじめてから、おやのありがたさがみにしみてわかりました。", "meaning": "开始独居之后，才深切体会到父母的好。", "level": "N2"},
    {"id": 1454, "word": "社会人になってから、学生時代にもっと勉強しておけばよかったと後悔しています。", "reading": "しゃかいじんになってから、がくせいじだいにもっとべんきょうしておけばよかったとこうかいしています。", "meaning": "工作以后，后悔学生时代没有多学点。", "level": "N2"},
    {"id": 1455, "word": "お金がないわけではないけど、無駄遣いはしたくないんです。", "reading": "おかねがないわけではないけど、むだづかいはしたくないんです。", "meaning": "不是没有钱，但不想乱花。", "level": "N2"},
    {"id": 1456, "word": "急いで走ったおかげで、なんとか終電に間に合いました。", "reading": "いそいではしったおかげで、なんとかしゅうでんにまにあいました。", "meaning": "多亏拼命跑了，总算赶上了末班车。", "level": "N2"},
    {"id": 1457, "word": "初めて会ったとは思えないくらい、話が盛り上がりました。", "reading": "はじめてあったとはおもえないくらい、はなしがもりあがりました。", "meaning": "聊得很开心，简直不像是初次见面。", "level": "N2"},
    {"id": 1458, "word": "みんなが反対しても、自分が正しいと思ったら、やるべきだと思います。", "reading": "みんながはんたいしても、じぶんがただしいとおもったら、やるべきだとおもいます。", "meaning": "即使大家都反对，如果自己觉得是对的，就应该去做。", "level": "N2"},
    {"id": 1459, "word": "あの時勇気を出して声をかけていなかったら、今の自分はいないと思います。", "reading": "あのときゆうきをだしてこえをかけていなかったら、いまのじぶんはいないとおもいます。", "meaning": "如果那时没有鼓起勇气搭话，就不会有现在的自己。", "level": "N2"},
    {"id": 1460, "word": "仕事は大変だけど、やりがいがあるから続けていられるんだと思います。", "reading": "しごとはたいへんだけど、やりがいがあるからつづけていられるんだとおもいます。", "meaning": "工作虽然辛苦，但因为有成就感才能坚持下来。", "level": "N2"},
    {"id": 1461, "word": "どこに行っても、結局は自分自身と向き合わなければならないんですよね。", "reading": "どこにいっても、けっきょくはじぶんじしんとむきあわなければならないんですよね。", "meaning": "不管去哪里，最终都必须面对自己。", "level": "N2"},
    {"id": 1462, "word": "この仕事を引き受けたからには、最後まで責任を持ってやり遂げます。", "reading": "このしごとをひきうけたからには、さいごまでせきにんをもってやりとげます。", "meaning": "既然接了这份工作，就会负责到底完成。", "level": "N2"},
    {"id": 1463, "word": "どんなに疲れていても、子供の寝顔を見ると癒されます。", "reading": "どんなにつかれていても、こどものねがおをみるといやされます。", "meaning": "不管多累，看到孩子的睡脸就被治愈了。", "level": "N2"},
    {"id": 1464, "word": "ここまで来たんだから、もう後には引けませんよ。", "reading": "ここまできたんだから、もううしろにはひけませんよ。", "meaning": "都走到这一步了，不能再退缩了。", "level": "N2"},
    {"id": 1465, "word": "あんなに練習したのに本番でミスしてしまって、自分が情けないです。", "reading": "あんなにれんしゅうしたのにほんばんでミスしてしまって、じぶんがなさけないです。", "meaning": "练了那么多正式上场却失误了，觉得自己很没用。", "level": "N2"},
    {"id": 1466, "word": "たとえ遠く離れていても、気持ちはいつもそばにいるよ。", "reading": "たとえとおくはなれていても、きもちはいつもそばにいるよ。", "meaning": "即使相隔很远，心也一直在你身边。", "level": "N2"},
    {"id": 1467, "word": "相手の立場になって考えてみたら、怒る気持ちも少し分かる気がしました。", "reading": "あいてのたちばになってかんがえてみたら、おこるきもちもすこしわかるきがしました。", "meaning": "站在对方的立场想想，好像也能理解生气的心情了。", "level": "N2"},
    {"id": 1468, "word": "期待していた以上の結果が出て、チーム全員で喜びました。", "reading": "きたいしていたいじょうのけっかがでて、チームぜんいんでよろこびました。", "meaning": "出了超出期待的结果，全队都很高兴。", "level": "N2"},
    {"id": 1469, "word": "正直に言うと、あまり期待していなかったんですが、予想を裏切られました。", "reading": "しょうじきにいうと、あまりきたいしていなかったんですが、よそうをうらぎられました。", "meaning": "说实话没怎么期待，结果出乎意料地好。", "level": "N2"},
    {"id": 1470, "word": "あの時の経験があったからこそ、今の自分があると思っています。", "reading": "あのときのけいけんがあったからこそ、いまのじぶんがあるとおもっています。", "meaning": "正是因为有了那时的经历，才有了现在的自己。", "level": "N2"},
    {"id": 1471, "word": "やるって言ったからにはちゃんとやれよ、中途半端が一番よくない。", "reading": "やるっていったからにはちゃんとやれよ、ちゅうとはんぱがいちばんよくない。", "meaning": "既然说了要做就好好做，半途而废最不好。", "level": "N2"},
    {"id": 1472, "word": "まさかあの人がそんなことをするとは、夢にも思いませんでした。", "reading": "まさかあのひとがそんなことをするとは、ゆめにもおもいませんでした。", "meaning": "做梦也没想到那个人会做那种事。", "level": "N2"},
    {"id": 1473, "word": "気持ちは嬉しいんだけど、これ以上迷惑をかけるわけにはいかないんだ。", "reading": "きもちはうれしいんだけど、これいじょうめいわくをかけるわけにはいかないんだ。", "meaning": "心意我很感激，但不能再给你添麻烦了。", "level": "N2"},
    {"id": 1474, "word": "泣いてもいいし、弱音を吐いてもいい、でも諦めるのだけはやめてくれ。", "reading": "ないてもいいし、よわねをはいてもいい、でもあきらめるのだけはやめてくれ。", "meaning": "可以哭，也可以示弱，但就是别放弃。", "level": "N2"},
    {"id": 1475, "word": "あいつのことだから、きっと何とかするだろうと思っていたけど、やっぱりな。", "reading": "あいつのことだから、きっとなんとかするだろうとおもっていたけど、やっぱりな。", "meaning": "因为是那家伙嘛，就知道他一定能搞定，果然。", "level": "N2"},
    {"id": 1476, "word": "表面上は笑っているけど、本当はすごく辛いんじゃないかと心配しています。", "reading": "ひょうめんじょうはわらっているけど、ほんとうはすごくつらいんじゃないかとしんぱいしています。", "meaning": "表面上在笑，但我担心其实很痛苦。", "level": "N2"},
    {"id": 1477, "word": "石の上にも三年というように、何事も続けることが大切です。", "reading": "いしのうえにもさんねんというように、なにごともつづけることがたいせつです。", "meaning": "正如'铁杵磨成针'所说，坚持做任何事都很重要。", "level": "N2"},
    {"id": 1478, "word": "百聞は一見にしかずというから、実際に行って確かめてみましょう。", "reading": "ひゃくぶんはいっけんにしかずというから、じっさいにいってたしかめてみましょう。", "meaning": "百闻不如一见，实际去看看吧。", "level": "N2"},
    {"id": 1479, "word": "出る杭は打たれると言いますが、それでも自分らしくいたいです。", "reading": "でるくいはうたれるといいますが、それでもじぶんらしくいたいです。", "meaning": "虽说枪打出头鸟，但我还是想做自己。", "level": "N2"},
    {"id": 1480, "word": "今はまだ未熟ですが、いつか必ずあなたに認められるような人間になります。", "reading": "いまはまだみじゅくですが、いつかかならずあなたにみとめられるようなにんげんになります。", "meaning": "现在还不够成熟，但总有一天会成为你认可的人。", "level": "N2"},
    {"id": 1481, "word": "人は見かけによらないというけれど、本当にその通りだと思いました。", "reading": "ひとはみかけによらないというけれど、ほんとうにそのとおりだとおもいました。", "meaning": "都说人不可貌相，真的是那样。", "level": "N2"},
    {"id": 1482, "word": "自分がどれだけ恵まれているか、海外に行って初めて気づきました。", "reading": "じぶんがどれだけめぐまれているか、かいがいにいってはじめてきづきました。", "meaning": "出国之后才第一次意识到自己有多幸运。", "level": "N2"},
    {"id": 1483, "word": "今日できることを明日に延ばすな、と自分に言い聞かせています。", "reading": "きょうできることをあしたにのばすな、とじぶんにいいきかせています。", "meaning": "告诫自己今天能做的事别拖到明天。", "level": "N2"},
    {"id": 1484, "word": "誰かのために頑張れる自分でいたいと、いつも思っています。", "reading": "だれかのためにがんばれるじぶんでいたいと、いつもおもっています。", "meaning": "一直希望自己能成为为别人努力的人。", "level": "N2"},
    {"id": 1485, "word": "完璧を目指すより、まず一歩を踏み出すことの方が大事だと思います。", "reading": "かんぺきをめざすより、まずいっぽをふみだすことのほうがだいじだとおもいます。", "meaning": "比起追求完美，先迈出第一步更重要。", "level": "N2"},
    {"id": 1486, "word": "人生に正解はないけど、自分が選んだ道を正解にすることはできると思います。", "reading": "じんせいにせいかいはないけど、じぶんがえらんだみちをせいかいにすることはできるとおもいます。", "meaning": "人生没有正确答案，但可以把自己选的路变成正确答案。", "level": "N2"},
    {"id": 1487, "word": "大切なのは何を持っているかじゃなくて、今ある物にどれだけ感謝できるかだと思います。", "reading": "たいせつなのはなにをもっているかじゃなくて、いまあるものにどれだけかんしゃできるかだとおもいます。", "meaning": "重要的不是拥有什么，而是能多感恩现在拥有的东西。", "level": "N2"},
    {"id": 1488, "word": "出会いと別れを繰り返しながら、人は少しずつ強くなっていくんだと思います。", "reading": "であいとわかれをくりかえしながら、ひとはすこしずつつよくなっていくんだとおもいます。", "meaning": "在不断的相遇和离别中，人会一点一点变得坚强。", "level": "N2"},
    {"id": 1489, "word": "あれだけ注意したにもかかわらず、同じミスを繰り返してしまいました。", "reading": "あれだけちゅういしたにもかかわらず、おなじミスをくりかえしてしまいました。", "meaning": "尽管提醒了那么多次，还是犯了同样的错。", "level": "N2"},
    {"id": 1490, "word": "彼に頼まれると断れない性格なので、つい引き受けてしまいます。", "reading": "かれにたのまれるとことわれないせいかくなので、ついひきうけてしまいます。", "meaning": "被他拜托就没法拒绝的性格，总是接下来。", "level": "N2"},
    {"id": 1491, "word": "この仕事は自分に向いていないと思いながらも、なかなか辞められません。", "reading": "このしごとはじぶんにむいていないとおもいながらも、なかなかやめられません。", "meaning": "虽然觉得这份工作不适合自己，但怎么也辞不了。", "level": "N2"},
    {"id": 1492, "word": "住めば都というように、最初は嫌だった場所も慣れたら好きになりました。", "reading": "すめばみやこというように、さいしょはいやだったばしょもなれたらすきになりました。", "meaning": "正如'日久生情'所说，一开始不喜欢的地方习惯了就喜欢上了。", "level": "N2"},
    {"id": 1493, "word": "あの時もっと素直になっていれば、結果は違っていたかもしれません。", "reading": "あのときもっとすなおになっていれば、けっかはちがっていたかもしれません。", "meaning": "如果那时候更坦诚一点，结果可能会不同。", "level": "N2"},
    {"id": 1494, "word": "年を取れば取るほど、時間の大切さが分かるようになりますね。", "reading": "としをとればとるほど、じかんのたいせつさがわかるようになりますね。", "meaning": "越年长越能体会时间的珍贵。", "level": "N2"},
    {"id": 1495, "word": "結局のところ、自分が幸せかどうかは自分で決めるしかないんです。", "reading": "けっきょくのところ、じぶんがしあわせかどうかはじぶんできめるしかないんです。", "meaning": "说到底，自己幸不幸福只能自己决定。", "level": "N2"},
    {"id": 1496, "word": "クライアントからの要望が急に変わって、一から作り直さなければならなくなりました。", "reading": "クライアントからのようぼうがきゅうにかわって、いちからつくりなおさなければならなくなりました。", "meaning": "客户的要求突然变了，不得不从头重做。", "level": "N2"},
    {"id": 1497, "word": "後輩がミスしたんですけど、自分の指示が悪かったのかなとも思って、あまり怒れませんでした。", "reading": "こうはいがミスしたんですけど、じぶんのしじがわるかったのかなともおもって、あまりおこれませんでした。", "meaning": "后辈犯了错，但想想是不是自己指示不清，也没法太生气。", "level": "N2"},
    {"id": 1498, "word": "取引先との飲み会で、つい飲みすぎて次の日の仕事に影響が出てしまいました。", "reading": "とりひきさきとののみかいで、ついのみすぎてつぎのひのしごとにえいきょうがでてしまいました。", "meaning": "和客户喝酒不小心喝多了，影响了第二天的工作。", "level": "N2"},
    {"id": 1499, "word": "異動の話が来たんですけど、今のチームを離れたくないから正直迷っています。", "reading": "いどうのはなしがきたんですけど、いまのチームをはなれたくないからしょうじきまよっています。", "meaning": "被提出调动了，但不想离开现在的团队所以很纠结。", "level": "N2"},
    {"id": 1500, "word": "あの人のことは嫌いじゃないけど、一緒にいると気を遣いすぎて疲れるんです。", "reading": "あのひとのことはきらいじゃないけど、いっしょにいるときをつかいすぎてつかれるんです。", "meaning": "不是讨厌那个人，但在一起太费心思会累。", "level": "N2"},
    {"id": 1501, "word": "彼とは価値観が合わないと分かっていたけど、好きだったから目をつぶっていました。", "reading": "かれとはかちかんがあわないとわかっていたけど、すきだったからめをつぶっていました。", "meaning": "知道和他三观不合，但因为喜欢就睁一只眼闭一只眼了。", "level": "N2"},
    {"id": 1502, "word": "SNSでは楽しそうにしているけど、実際はそうでもないことって結構あるよね。", "reading": "SNSではたのしそうにしているけど、じっさいはそうでもないことってけっこうあるよね。", "meaning": "社交媒体上看着很开心，但实际并非如此的情况挺多的吧。", "level": "N2"},
    {"id": 1503, "word": "何も言わなくても分かってくれる友達がいるって、本当に幸せなことだと思います。", "reading": "なにもいわなくてもわかってくれるともだちがいるって、ほんとうにしあわせなことだとおもいます。", "meaning": "有不用说什么就能理解你的朋友，真的很幸福。", "level": "N2"},
    {"id": 1504, "word": "あの人に嫌われたくないと思えば思うほど、逆に変なことを言ってしまいます。", "reading": "あのひとにきらわれたくないとおもえばおもうほど、ぎゃくにへんなことをいってしまいます。", "meaning": "越不想被那个人讨厌，反而越说出奇怪的话。", "level": "N2"},
    {"id": 1505, "word": "相手のことを考えて言ったつもりなのに、傷つけてしまったみたいで申し訳ないです。", "reading": "あいてのことをかんがえていったつもりなのに、きずつけてしまったみたいでもうしわけないです。", "meaning": "本意是为对方着想才说的，好像却伤害了对方很抱歉。", "level": "N2"},
    {"id": 1506, "word": "あの店のラーメンを食べたら他の店のラーメンが物足りなく感じるようになってしまいました。", "reading": "あのみせのラーメンをたべたらほかのみせのラーメンがものたりなくかんじるようになってしまいました。", "meaning": "吃了那家店的拉面之后觉得别家的都不够味了。", "level": "N2"},
    {"id": 1507, "word": "タクシーの運転手さんがすごくおしゃべりで、疲れていたけど寝るわけにもいかなくて困りました。", "reading": "タクシーのうんてんしゅさんがすごくおしゃべりで、つかれていたけどねるわけにもいかなくてこまりました。", "meaning": "出租车司机特别爱聊天，虽然很累但也不好意思睡觉。", "level": "N2"},
    {"id": 1508, "word": "セールだからって必要ないものまで買ってしまうのは、もうやめようと毎回思うんですけどね。", "reading": "セールだからってひつようないものまでかってしまうのは、もうやめようとまいかいおもうんですけどね。", "meaning": "每次都想着别因为打折就买不需要的东西了，但每次都这样。", "level": "N2"},
    {"id": 1509, "word": "限定品だと聞くと買わないと損した気分になるけど、冷静に考えると別にいらないんですよね。", "reading": "げんていひんだときくとかわないとそんしたきぶんになるけど、れいせいにかんがえるとべつにいらないんですよね。", "meaning": "一听是限定品不买就觉得亏了，但冷静想想其实不需要。", "level": "N2"},
    {"id": 1510, "word": "観光地として有名だけど、地元の人に聞いたらもっと穴場のスポットを教えてもらえました。", "reading": "かんこうちとしてゆうめいだけど、じもとのひとにきいたらもっとあなばのスポットをおしえてもらえました。", "meaning": "虽然是著名观光地，但问了当地人告诉我更小众的好地方。", "level": "N2"},
    {"id": 1511, "word": "分からない単語が出てきても、前後の文脈で意味が推測できることが多いです。", "reading": "わからないたんごがでてきても、ぜんごのぶんみゃくでいみがすいそくできることがおおいです。", "meaning": "即使出现不认识的词，很多时候也能通过上下文猜出意思。", "level": "N2"},
    {"id": 1512, "word": "完璧に覚えてから使おうとすると、いつまで経っても話せるようになりません。", "reading": "かんぺきにおぼえてからつかおうとすると、いつまでたってもはなせるようになりません。", "meaning": "如果非要完美记住了再用，永远也学不会说。", "level": "N2"},
    {"id": 1513, "word": "日本の電車が時間通りに来るのに慣れすぎて、海外に行くとイライラしてしまいます。", "reading": "にほんのでんしゃがじかんどおりにくるのになれすぎて、かいがいにいくとイライラしてしまいます。", "meaning": "太习惯日本电车准点了，去国外就会烦躁。", "level": "N2"},
    {"id": 1514, "word": "敬語は難しいけど、使えるようになると日本人との距離がぐっと縮まる気がします。", "reading": "けいごはむずかしいけど、つかえるようになるとにほんじんとのきょりがぐっとちぢまるきがします。", "meaning": "敬语虽然难，但学会了感觉和日本人的距离一下子拉近了。", "level": "N2"},
    {"id": 1515, "word": "日本人は本音を言わないと言われるけど、それは相手を傷つけたくないからだと思います。", "reading": "にほんじんはほんねをいわないといわれるけど、それはあいてをきずつけたくないからだとおもいます。", "meaning": "都说日本人不说真心话，但那是因为不想伤害对方。", "level": "N2"},
    {"id": 1516, "word": "「空気を読む」という文化は、外国人にとって一番難しいところかもしれません。", "reading": "「くうきをよむ」というぶんかは、がいこくじんにとっていちばんむずかしいところかもしれません。", "meaning": "'察言观色'这种文化，对外国人来说可能是最难的地方。", "level": "N2"},
    {"id": 1517, "word": "日本のサービスは丁寧すぎて、最初はびっくりしたけど、今はそれが当たり前になってしまいました。", "reading": "にほんのサービスはていねいすぎて、さいしょはびっくりしたけど、いまはそれがあたりまえになってしまいました。", "meaning": "日本的服务太周到了，一开始很惊讶，现在已经习以为常了。", "level": "N2"},
    {"id": 1518, "word": "「もったいない」という言葉が好きで、日本に来てから物を大切にするようになりました。", "reading": "「もったいない」ということばがすきで、にほんにきてからものをたいせつにするようになりました。", "meaning": "很喜欢'可惜浪费'这个词，来日本后变得更珍惜东西了。", "level": "N2"},
    {"id": 1519, "word": "他人と比べても意味がないと頭では分かっているのに、つい比べてしまう自分が嫌です。", "reading": "たにんとくらべてもいみがないとあたまではわかっているのに、ついくらべてしまうじぶんがいやです。", "meaning": "道理上知道和别人比没意义，但忍不住去比的自己很讨厌。", "level": "N2"},
    {"id": 1520, "word": "逃げたいと思うことは恥ずかしいことじゃなくて、自分を守るための大事な感情だと思います。", "reading": "にげたいとおもうことははずかしいことじゃなくて、じぶんをまもるためのだいじなかんじょうだとおもいます。", "meaning": "想逃避不是可耻的事，而是保护自己的重要情感。", "level": "N2"},
    {"id": 1521, "word": "昔の自分に会えるとしたら、「そんなに焦らなくていいよ」と言ってあげたいです。", "reading": "むかしのじぶんにあえるとしたら、「そんなにあせらなくていいよ」といってあげたいです。", "meaning": "如果能见到从前的自己，想对他说'不用那么着急'。", "level": "N2"},
    {"id": 1522, "word": "大人になるって、選択肢が増えることじゃなくて、選ばなかった道を受け入れることだと思います。", "reading": "おとなになるって、せんたくしがふえることじゃなくて、えらばなかったみちをうけいれることだとおもいます。", "meaning": "长大不是选项变多了，而是接受那些没有选的路。", "level": "N2"},
    {"id": 1523, "word": "幸せって探すものじゃなくて、気づくものなんだなと最近思うようになりました。", "reading": "しあわせってさがすものじゃなくて、きづくものなんだなとさいきんおもうようになりました。", "meaning": "最近觉得幸福不是找出来的，而是发现的。", "level": "N2"},
    {"id": 1524, "word": "昨日できなかったことが今日できるようになっていたら、それだけで十分すごいことだと思います。", "reading": "きのうできなかったことがきょうできるようになっていたら、それだけでじゅうぶんすごいことだとおもいます。", "meaning": "如果昨天不会的今天会了，光这一点就已经很了不起了。", "level": "N2"},
    {"id": 1525, "word": "人生って思い通りにならないことばかりだけど、だからこそ面白いのかもしれません。", "reading": "じんせいっておもいどおりにならないことばかりだけど、だからこそおもしろいのかもしれません。", "meaning": "人生尽是不如意的事，但也许正因如此才有趣。", "level": "N2"},
    {"id": 1526, "word": "あいつ、口ではああ言ってるけど、本当は気にしてるんだよ、知ってるくせに。", "reading": "あいつ、くちではああいってるけど、ほんとうはきにしてるんだよ、しってるくせに。", "meaning": "那家伙嘴上那么说但其实在意的，你明明知道。", "level": "N2"},
    {"id": 1527, "word": "お前がそう言うなら信じるけど、もし嘘だったら許さないからな。", "reading": "おまえがそういうならしんじるけど、もしうそだったらゆるさないからな。", "meaning": "你那么说我就信你，但要是骗我的话不会原谅你的。", "level": "N2"},
    {"id": 1528, "word": "逃げるのは簡単だけど、逃げた後の自分が嫌になるのは分かってるだろ。", "reading": "にげるのはかんたんだけど、にげたあとのじぶんがいやになるのはわかってるだろ。", "meaning": "逃是容易，但逃了之后会讨厌自己的你知道的吧。", "level": "N2"},
    {"id": 1529, "word": "いくら考えても答えが出ないなら、とりあえず動いてみるしかないんじゃない？", "reading": "いくらかんがえてもこたえがでないなら、とりあえずうごいてみるしかないんじゃない？", "meaning": "怎么想都想不出答案的话，不如先动起来试试？", "level": "N2"},
    {"id": 1530, "word": "悪いのは俺だって分かってる、でも今さら謝ったところで何も変わらないだろ。", "reading": "わるいのはおれだってわかってる、でもいまさらあやまったところでなにもかわらないだろ。", "meaning": "知道是我的错，但事到如今道歉也改变不了什么吧。", "level": "N2"},
    {"id": 1531, "word": "強がってるだけだろ、本当は助けてほしいくせに、素直になれよ。", "reading": "つよがってるだけだろ、ほんとうはたすけてほしいくせに、すなおになれよ。", "meaning": "只是在逞强吧，明明想要人帮忙的，坦诚一点啊。", "level": "N2"},
    {"id": 1532, "word": "どうせ俺なんかって思った時点で負けだよ、まだ何も始まってないんだから。", "reading": "どうせおれなんかっておもったじてんでまけだよ、まだなにもはじまってないんだから。", "meaning": "想'反正我不行'的那一刻就输了，什么都还没开始呢。", "level": "N2"},
    {"id": 1533, "word": "やるって決めたんなら最後までやれよ、途中で投げ出すのが一番かっこ悪い。", "reading": "やるってきめたんならさいごまでやれよ、とちゅうでなげだすのがいちばんかっこわるい。", "meaning": "决定了要做就做到最后，半途而废最丢人。", "level": "N2"},
    {"id": 1534, "word": "あの時ああしていれば、って考えても仕方ないんだけど、考えちゃうんだよな。", "reading": "あのときああしていれば、ってかんがえてもしかたないんだけど、かんがえちゃうんだよな。", "meaning": "想着如果那时候那样做了就好了，虽然想也没用但还是忍不住想。", "level": "N2"},
    {"id": 1535, "word": "お前のことだから大丈夫だとは思うけど、何かあったらすぐ連絡しろよ。", "reading": "おまえのことだからだいじょうぶだとはおもうけど、なにかあったらすぐれんらくしろよ。", "meaning": "因为是你所以应该没问题，但有什么事马上联系。", "level": "N2"},
    {"id": 1536, "word": "俺がどれだけ心配したか分かってんのかよ、連絡くらいしろって言っただろ。", "reading": "おれがどれだけしんぱいしたかわかってんのかよ、れんらくくらいしろっていっただろ。", "meaning": "你知道我多担心吗，不是说了至少联系一下吗。", "level": "N2"},
    {"id": 1537, "word": "別に期待してないから、気にしなくていいよ、いつものことだし。", "reading": "べつにきたいしてないから、きにしなくていいよ、いつものことだし。", "meaning": "反正也没期待，不用在意，一直都这样。", "level": "N2"},
    {"id": 1538, "word": "傘を持って出たのに降らなくて、降らない日に限って持っていないという法則がある気がします。", "reading": "かさをもってでたのにふらなくて、ふらないひにかぎってもっていないというほうそくがあるきがします。", "meaning": "带了伞却没下雨，不下雨的时候偏偏没带，好像有这么个定律。", "level": "N2"},
    {"id": 1539, "word": "久しぶりに運動したら、次の日に筋肉痛が来るかと思ったら、二日後に来て歳を感じました。", "reading": "ひさしぶりにうんどうしたら、つぎのひにきんにくつうがくるかとおもったら、ふつかごにきてとしをかんじました。", "meaning": "好久没运动了，以为第二天会肌肉酸痛，结果两天后才来，感觉老了。", "level": "N2"},
    {"id": 1540, "word": "新しく始めたいことはたくさんあるのに、時間もお金も足りなくてもどかしいです。", "reading": "あたらしくはじめたいことはたくさんあるのに、じかんもおかねもたりなくてもどかしいです。", "meaning": "想开始的新事物很多，但时间和钱都不够很焦躁。", "level": "N2"},
    {"id": 1541, "word": "人に優しくするのは簡単なようで難しいし、自分に優しくするのはもっと難しいです。", "reading": "ひとにやさしくするのはかんたんなようでむずかしいし、じぶんにやさしくするのはもっとむずかしいです。", "meaning": "对别人温柔看似简单其实很难，对自己温柔更难。", "level": "N2"},
    {"id": 1542, "word": "「今度」って言われて本当に実現したことがほとんどないのは、日本あるあるだと思います。", "reading": "「こんど」っていわれてほんとうにじつげんしたことがほとんどないのは、にほんあるあるだとおもいます。", "meaning": "被说'下次吧'基本没实现过，这是日本人的常态。", "level": "N2"},
    {"word": "書き直しを何度もさせられて、正直うんざりしました。", "reading": "かきなおしをなんどもさせられて、しょうじきうんざりしました。", "meaning": "被要求改了好多次，说实话真的烦了。", "level": "N2", "id": 1543},
    {"word": "初めて作ったにしては、なかなか上手にできたと思います。", "reading": "はじめてつくったにしては、なかなかじょうずにできたとおもいます。", "meaning": "第一次做的话，我觉得做得还挺不错的。", "level": "N2", "id": 1544},
    {"word": "知らなかったとはいえ、失礼なことをしてしまいました。", "reading": "しらなかったとはいえ、しつれいなことをしてしまいました。", "meaning": "虽然不知道，但还是做了失礼的事情。", "level": "N2", "id": 1545},
    {"word": "頭では分かっているんだけど、気持ちがついていかないんです。", "reading": "あたまではわかっているんだけど、きもちがついていかないんです。", "meaning": "道理我都懂，但感情上跟不上。", "level": "N2", "id": 1546},
    {"word": "勉強しなきゃと思いつつ、気づいたら二時間もスマホを見ていました。", "reading": "べんきょうしなきゃとおもいつつ、きづいたらにじかんもスマホをみていました。", "meaning": "虽然心里想着必须学习，但不知不觉看了两小时手机。", "level": "N2", "id": 1547},
    {"word": "満員電車で一時間立ちっぱなしで、足がパンパンです。", "reading": "まんいんでんしゃでいちじかんたちっぱなしで、あしがパンパンです。", "meaning": "在拥挤的电车上站了一个小时，腿都肿了。", "level": "N2", "id": 1548},
    {"word": "面接を受けたんですけど、手応えがなくて落ち込んでいます。", "reading": "めんせつをうけたんですけど、てごたえがなくておちこんでいます。", "meaning": "面试参加了，但没什么把握，很沮丧。", "level": "N2", "id": 1549},
    {"word": "渡すタイミングを逃してしまって、結局渡せないまま帰ってしまいました。", "reading": "わたすタイミングをのがしてしまって、けっきょくわたせないままかえってしまいました。", "meaning": "错过了交给对方的时机，结果没送出去就回去了。", "level": "N2", "id": 1550},
    {"word": "貸したお金がなかなか返ってこなくて、催促しにくいです。", "reading": "かしたおかねがなかなかかえってこなくて、さいそくしにくいです。", "meaning": "借出去的钱迟迟不还，又不好意思催。", "level": "N2", "id": 1551},
    {"word": "変えたいと思っていても、長年の習慣はなかなか変えられません。", "reading": "かえたいとおもっていても、ながねんのしゅうかんはなかなかかえられません。", "meaning": "虽然想改变，但多年的习惯很难改掉。", "level": "N2", "id": 1552},
    {"word": "子供に壊されたけど、怒るに怒れなくて困りました。", "reading": "こどもにこわされたけど、おこるにおこれなくてこまりました。", "meaning": "被孩子弄坏了，又不好发火，很为难。", "level": "N2", "id": 1553},
    {"word": "やることが増えるばかりで、一つ終わるとまた二つ増える感じです。", "reading": "やることがふえるばかりで、ひとつおわるとまたふたつふえるかんじです。", "meaning": "事情越来越多，做完一件又多两件的感觉。", "level": "N2", "id": 1554},
    {"word": "最近お客さんが減ってきて、お店の経営が心配です。", "reading": "さいきんおきゃくさんがへってきて、おみせのけいえいがしんぱいです。", "meaning": "最近客人越来越少，担心店的经营。", "level": "N2", "id": 1555},
    {"word": "急いで出たのに電車が目の前で行ってしまって、次のを待つはめになりました。", "reading": "いそいででたのにでんしゃがめのまえでいってしまって、つぎのをまつはめになりました。", "meaning": "急忙出门结果电车在眼前开走了，只好等下一班。", "level": "N2", "id": 1556},
    {"word": "突然電車が止まって、車内アナウンスを聞いたら人身事故でした。", "reading": "とつぜんでんしゃがとまって、しゃないアナウンスをきいたらじんしんじこでした。", "meaning": "电车突然停了，听到广播说是人身事故。", "level": "N2", "id": 1557},
    {"word": "あまりにも変わっていたので、驚いて声が出ませんでした。", "reading": "あまりにもかわっていたので、おどろいてこえがでませんでした。", "meaning": "变化太大了，惊得说不出话来。", "level": "N2", "id": 1558},
    {"word": "迷いに迷って、結局一番最初に気になったものを選びました。", "reading": "まよいにまよって、けっきょくいちばんさいしょにきになったものをえらびました。", "meaning": "犹豫来犹豫去，最后选了最开始看中的那个。", "level": "N2", "id": 1559},
    {"word": "手伝おうか？って聞いたら「大丈夫」って言われて、微妙な空気になりました。", "reading": "てつだおうか？ってきいたら「だいじょうぶ」っていわれて、びみょうなくうきになりました。", "meaning": "问要不要帮忙被说「没事」，气氛反而变微妙了。", "level": "N2", "id": 1560},
    {"word": "言われて初めて気づいたんですけど、確かにその通りでした。", "reading": "いわれてはじめてきづいたんですけど、たしかにそのとおりでした。", "meaning": "被人一说才注意到，确实是那样。", "level": "N2", "id": 1561},
    {"word": "頼まれると断れない性格なので、つい引き受けてしまいます。", "reading": "たのまれるとことわれないせいかくなので、ついひきうけてしまいます。", "meaning": "被人拜托就没法拒绝，总是不知不觉就接下来了。", "level": "N2", "id": 1562},
    {"word": "断りたいけど、関係が壊れるのが怖くて断れないんです。", "reading": "ことわりたいけど、かんけいがこわれるのがこわくてことわれないんです。", "meaning": "想拒绝但怕破坏关系所以拒绝不了。", "level": "N2", "id": 1563},
    {"word": "誘ってもらえて嬉しかったけど、先約があって行けませんでした。", "reading": "さそってもらえてうれしかったけど、せんやくがあっていけませんでした。", "meaning": "被邀请很高兴，但有先约去不了。", "level": "N2", "id": 1564},
    {"word": "手伝おうとしたら「大丈夫」と言われて、逆に気まずかったです。", "reading": "てつだおうとしたら「だいじょうぶ」といわれて、ぎゃくにきまずかったです。", "meaning": "想帮忙但被说「没事」，反而尴尬了。", "level": "N2", "id": 1565},
    {"word": "ルールを守らない人がいると、真面目にやっている人が損をします。", "reading": "るーるをまもらないひとがいると、まじめにやっているひとがそんをします。", "meaning": "有人不守规矩的话，认真做的人就吃亏了。", "level": "N2", "id": 1566},
    {"word": "ネットで調べてみたけど、情報が多すぎて逆に分からなくなりました。", "reading": "ねっとでしらべてみたけど、じょうほうがおおすぎてぎゃくにわからなくなりました。", "meaning": "上网查了但信息太多反而更不明白了。", "level": "N2", "id": 1567},
    {"word": "信じていたのに裏切られて、誰も信じられなくなりました。", "reading": "しんじていたのにうらぎられて、だれもしんじられなくなりました。", "meaning": "明明信任的人却被背叛了，变得谁也不信了。", "level": "N2", "id": 1568},
    {"word": "褒められると伸びるタイプなので、もっと褒めてほしいです。", "reading": "ほめられるとのびるたいぷなので、もっとほめてほしいです。", "meaning": "被夸就会进步的类型，所以请多夸夸我。", "level": "N2", "id": 1569},
    {"word": "叱られた時は嫌だったけど、今思えばあの言葉に救われました。", "reading": "しかられたときはいやだったけど、いまおもえばあのことばにすくわれました。", "meaning": "被训的时候觉得讨厌，但现在想想被那些话救了。", "level": "N2", "id": 1570},
    {"word": "ネットで調べたら、全然違う情報が出てきて余計に混乱しました。", "reading": "ねっとでしらべたら、ぜんぜんちがうじょうほうがでてきてよけいにこんらんしました。", "meaning": "上网查了结果出来完全不同的信息，更混乱了。", "level": "N2", "id": 1571},
    {"word": "デートに何を着ていくか一時間も迷って、結局いつもの服にしました。", "reading": "でーとになにをきていくかいちじかんもまよって、けっきょくいつものふくにしました。", "meaning": "约会不知道穿什么，犹豫了一小时结果穿了平时的衣服。", "level": "N2", "id": 1572},
    {"word": "準備は完璧だったのに、本番で緊張して頭が真っ白になりました。", "reading": "じゅんびはかんぺきだったのに、ほんばんできんちょうしてあたまがまっしろになりました。", "meaning": "准备得很完美，但正式场合太紧张脑子一片空白。", "level": "N2", "id": 1573},
    {"word": "洗い物がたまっているのは分かっているけど、見て見ぬふりをしています。", "reading": "あらいものがたまっているのはわかっているけど、みてみぬふりをしています。", "meaning": "碗碟堆了一堆我知道，但假装没看到。", "level": "N2", "id": 1574},
    {"word": "干したまま取り込むのを忘れて、また雨に降られました。", "reading": "ほしたままとりこむのをわすれて、またあめにふられました。", "meaning": "晾了衣服忘了收，又被雨淋了。", "level": "N2", "id": 1575},
    {"word": "引っ越したいけど、荷造りが面倒で踏み出せません。", "reading": "ひっこしたいけど、にづくりがめんどうでふみだせません。", "meaning": "想搬家但嫌打包麻烦迈不出这一步。", "level": "N2", "id": 1576},
    {"word": "無理しすぎて倒れたと聞いて、飛んでいきました。", "reading": "むりしすぎてたおれたときいて、とんでいきました。", "meaning": "听说因为太勉强倒下了，我赶紧飞奔过去。", "level": "N2", "id": 1577},
    {"word": "道で拾った財布を交番に届けたら、後日お礼の手紙が届きました。", "reading": "みちでひろったさいふをこうばんにとどけたら、ごじつおれいのてがみがとどきました。", "meaning": "在路上捡到钱包交到了派出所，后来收到了感谢信。", "level": "N2", "id": 1578},
    {"word": "毎日通っているうちに、店員さんと顔なじみになりました。", "reading": "まいにちかよっているうちに、てんいんさんとかおなじみになりました。", "meaning": "每天去着去着就和店员混了个脸熟。", "level": "N2", "id": 1579},
    {"word": "計画通りに進まなくて、スケジュールを組み直しました。", "reading": "けいかくどおりにすすまなくて、すけじゅーるをくみなおしました。", "meaning": "没能按计划推进，只好重新排日程。", "level": "N2", "id": 1580},
    {"word": "頑張りすぎて燃え尽きてしまったので、少し休むことにしました。", "reading": "がんばりすぎてもえつきてしまったので、すこしやすむことにしました。", "meaning": "太拼了结果燃尽了，决定休息一下。", "level": "N2", "id": 1581},
    {"word": "あんまり期待しないようにしていたのに、やっぱりがっかりしてしまいました。", "reading": "あんまりきたいしないようにしていたのに、やっぱりがっかりしてしまいました。", "meaning": "本来就没抱太大期望，但果然还是失望了。", "level": "N2", "id": 1582},
    {"word": "心配しても仕方ないって分かっているのに、つい最悪のケースを考えてしまいます。", "reading": "しんぱいしてもしかたないってわかっているのに、ついさいあくのけーすをかんがえてしまいます。", "meaning": "明知担心也没用，还是忍不住想最坏的情况。", "level": "N2", "id": 1583},
    {"word": "一晩で成功する人なんていない、みんな見えないところで努力しています。", "reading": "ひとばんでせいこうするひとなんていない、みんなみえないところでどりょくしています。", "meaning": "一夜之间成功的人不存在，大家都在看不到的地方努力着。", "level": "N2", "id": 1584},
    {"word": "失敗したからこそ学べたことがたくさんあると、今なら言えます。", "reading": "しっぱいしたからこそまなべたことがたくさんあると、いまならいえます。", "meaning": "正因为失败了才学到了很多，现在能这么说了。", "level": "N2", "id": 1585},
    {"word": "緊張しすぎて何を喋ったか覚えていないんですけど、大丈夫だったかな。", "reading": "きんちょうしすぎてなにをしゃべったかおぼえていないんですけど、だいじょうぶだったかな。", "meaning": "太紧张了完全不记得说了什么，应该还行吧。", "level": "N2", "id": 1586},
    {"word": "相談してくれれば力になれたのに、一人で抱え込んでいたんですね。", "reading": "そうだんしてくれればちからになれたのに、ひとりでかかえこんでいたんですね。", "meaning": "要是找我商量的话我可以帮忙的，原来你一直一个人扛着啊。", "level": "N2", "id": 1587},
    {"word": "理解しようとはしているけど、正直まだ納得できていません。", "reading": "りかいしようとはしているけど、しょうじきまだなっとくできていません。", "meaning": "虽然在努力理解，但老实说还没能接受。", "level": "N2", "id": 1588},
    {"word": "実際に経験してみないと分からないことってたくさんありますよね。", "reading": "じっさいにけいけんしてみないとわからないことってたくさんありますよね。", "meaning": "不亲身经历的话不会明白的事情还挺多的对吧。", "level": "N2", "id": 1589},
    {"word": "日本に来て初めて、自分がどれだけ恵まれていたか感じました。", "reading": "にほんにきてはじめて、じぶんがどれだけめぐまれていたかかんじました。", "meaning": "来了日本才第一次感受到自己以前多幸运。", "level": "N2", "id": 1590},
    {"word": "想像していたのと全然違って、いい意味で裏切られました。", "reading": "そうぞうしていたのとぜんぜんちがって、いいいみでうらぎられました。", "meaning": "和想象中完全不一样，是好的那种出乎意料。", "level": "N2", "id": 1591},
    {"word": "治ったと思って油断したら、またぶり返してしまいました。", "reading": "なおったとおもってゆだんしたら、またぶりかえしてしまいました。", "meaning": "以为好了就大意了，结果又复发了。", "level": "N2", "id": 1592},
    {"word": "我慢するのが当たり前だと思っていたけど、それは違うと気づきました。", "reading": "がまんするのがあたりまえだとおもっていたけど、それはちがうときづきました。", "meaning": "以前觉得忍耐是理所当然的，但意识到那是不对的。", "level": "N2", "id": 1593},
    {"word": "感謝の気持ちを伝えたいけど、改まって言うのは照れくさいです。", "reading": "かんしゃのきもちをつたえたいけど、あらたまっていうのはてれくさいです。", "meaning": "想表达感谢，但正式说出来还挺不好意思的。", "level": "N2", "id": 1594},
    {"word": "やらなかったことを後悔するより、やって失敗した方がマシだと思います。", "reading": "やらなかったことをこうかいするより、やってしっぱいしたほうがましだとおもいます。", "meaning": "与其后悔没做，不如做了失败还好一些。", "level": "N2", "id": 1595},
    {"word": "無事だと聞いて安心したけど、しばらく心臓がバクバクしていました。", "reading": "ぶじだときいてあんしんしたけど、しばらくしんぞうがばくばくしていました。", "meaning": "听到平安无事松了口气，但心脏扑通扑通跳了好一阵子。", "level": "N2", "id": 1596},
    {"word": "似た名前の人がいて間違えて呼んでしまって、めちゃくちゃ気まずかったです。", "reading": "にたなまえのひとがいてまちがえてよんでしまって、めちゃくちゃきまずかったです。", "meaning": "相似的名字弄混了叫错了，超尴尬。", "level": "N2", "id": 1597},
    {"word": "こんなことが起こるとは思ってもいなかったので、対応が遅れました。", "reading": "こんなことがおこるとはおもってもいなかったので、たいおうがおくれました。", "meaning": "没想到会发生这种事，应对迟了。", "level": "N2", "id": 1598},
    {"word": "作りすぎてたくさん余ったので、隣の人にもお裾分けしました。", "reading": "つくりすぎてたくさんあまったので、となりのひとにもおすそわけしました。", "meaning": "做太多了剩了很多，分给了隔壁邻居一些。", "level": "N2", "id": 1599},
    {"word": "翻訳アプリに頼りすぎて、自分の言葉で話す力がつかないなと反省しています。", "reading": "ほんやくあぷりにたよりすぎて、じぶんのことばではなすちからがつかないなとはんせいしています。", "meaning": "太依赖翻译软件了，反省自己用自己的话说的能力没长进。", "level": "N2", "id": 1600},
    {"word": "彼の代わりなんていないと思っていたけど、組織って意外と回るものですね。", "reading": "かれのかわりなんていないとおもっていたけど、そしきっていがいとまわるものですね。", "meaning": "以为好了放松警惕结果又复发了。", "level": "N2", "id": 1601},
    {"word": "自分らしく生きることが、一番大事なんだと最近思うようになりました。", "reading": "じぶんらしくいきることが、いちばんだいじなんだとさいきんおもうようになりました。", "meaning": "觉得谁也替代不了他，但组织意外地照常运转。", "level": "N2", "id": 1602},
    {"word": "苦労した分だけ成長できると信じて、今を頑張っています。", "reading": "くろうしたぶんだけせいちょうできるとしんじて、いまをがんばっています。", "meaning": "一边带孩子一边工作，比想象中累多了。", "level": "N2", "id": 1603},
    {"word": "最初は戸惑ったけど、慣れてしまえばどうってことないです。", "reading": "さいしょはとまどったけど、なれてしまえばどうってことないです。", "meaning": "相信吃过的苦都会让自己成长，所以现在加油。", "level": "N2", "id": 1604},
    {"word": "子供の頃に読んだ本が、今の自分の考え方に大きく影響しています。", "reading": "こどものころによんだほんが、いまのじぶんのかんがえかたにおおきくえいきょうしています。", "meaning": "以为跟自己无关，其实有很深的关系。", "level": "N2", "id": 1605},
    {"word": "何度注意しても直らないのは、本人が問題だと思っていないからです。", "reading": "なんどちゅういしてもなおらないのは、ほんにんがもんだいだとおもっていないからです。", "meaning": "小时候读过的书对现在的思维方式影响很大。", "level": "N2", "id": 1606},
    {"word": "出発する直前になって、チケットが見つからなくて大慌てしました。", "reading": "しゅっぱつするちょくぜんになって、ちけっとがみつからなくておおあわてしました。", "meaning": "好不容易做完了结果发现有错误要重做。", "level": "N2", "id": 1607},
    {"word": "就職してから、学生時代がいかに自由だったか痛感しました。", "reading": "しゅうしょくしてから、がくせいじだいがいかにじゆうだったかつうかんしました。", "meaning": "毕业十年了，当时的朋友还保持联系。", "level": "N2", "id": 1608},
    {"word": "離婚する時は辛かったけど、今はあの決断をしてよかったと思っています。", "reading": "りこんするときはつらかったけど、いまはあのけつだんをしてよかったとおもっています。", "meaning": "想结婚但得先找到对象才行啊。", "level": "N2", "id": 1609},
    {"word": "引退すると聞いた時はショックだったけど、新しい挑戦を応援しています。", "reading": "いんたいするときいたときはしょっくだったけど、あたらしいちょうせんをおうえんしています。", "meaning": "离婚的时候很痛苦，但现在觉得那个决定是对的。", "level": "N2", "id": 1610},
    {"word": "トラブルに冷静に対応できる人を、心から尊敬します。", "reading": "トラブルにれいせいにたいおうできるひとを、こころからそんけいします。", "meaning": "不要一个人解决，大家一起想吧。", "level": "N2", "id": 1611},
    {"word": "AIで翻訳すると便利だけど、微妙なニュアンスがずれることがあります。", "reading": "エーアイでほんやくするとべんりだけど、びみょうなニュアンスがずれることがあります。", "meaning": "交换了联系方式结果一次也没联系就结束了。", "level": "N2", "id": 1612},
    {"word": "問題から逃げずに向き合うのは大変だけど、逃げてもいつか追いつかれます。", "reading": "もんだいからにげずにむきあうのはたいへんだけど、にげてもいつかおいつかれます。", "meaning": "在日本生活之后才明白了很多事情。", "level": "N2", "id": 1613},
    {"word": "落ち込んでもすぐ立ち直れる人が羨ましいです。", "reading": "おちこんでもすぐたちなおれるひとがうらやましいです。", "meaning": "如果能翻过这堵墙，一定能变得更强。", "level": "N2", "id": 1614},
    {"word": "何も言わずに見守ってくれた両親に、今は感謝しかありません。", "reading": "なにもいわずにみまもってくれたりょうしんに、いまはかんしゃしかありません。", "meaning": "好羡慕那种低落了也能马上振作起来的人。", "level": "N2", "id": 1615},
    {"word": "現実を受け入れるのに時間がかかったけど、やっと前を向けるようになりました。", "reading": "げんじつをうけいれるのにじかんがかかったけど、やっとまえをむけるようになりました。", "meaning": "什么都没说只是默默守护我的父母，现在只有感激。", "level": "N2", "id": 1616},
    {"word": "引き受けたからには最後まで責任を持ってやり遂げます。", "reading": "ひきうけたからにはさいごまでせきにんをもってやりとげます。", "meaning": "接受现实花了些时间，但终于能向前看了。", "level": "N2", "id": 1617},
    {"word": "ずっと隠していたことを打ち明けたら、意外と受け入れてもらえました。", "reading": "ずっとかくしていたことをうちあけたら、いがいとうけいれてもらえました。", "meaning": "既然接下了就要负责到底。", "level": "N2", "id": 1618},
    {"word": "途中で何度もやめようと思ったけど、最後までやり遂げて本当によかったです。", "reading": "とちゅうでなんどもやめようとおもったけど、さいごまでやりとげてほんとうによかったです。", "meaning": "鼓起勇气说出了一直隐瞒的事情，意外地被接受了。", "level": "N2", "id": 1619},
    {"word": "この銀杏並木、葉っぱが黄色くてきれいだね。", "reading": "このいちょうなみき、はっぱがきいろくてきれいだね。", "meaning": "这条银杏大道，叶子黄黄的好漂亮啊。", "level": "N2", "id": 1620},
    {"word": "このラーメン屋、スープが濃厚で本当に美味しいよ。", "reading": "このらーめんや、すーぷがのうこうでほんとうにおいしいよ。", "meaning": "这家拉面店汤头浓郁，真的很好吃。", "level": "N2", "id": 1621},
    {"word": "あと一点で合格だったのに、本当に悔しい。", "reading": "あといってんでごうかくだったのに、ほんとうにくやしい。", "meaning": "就差一分就及格了，真的好不甘心。", "level": "N2", "id": 1622},
    {"word": "この曲を聴くと学生時代を思い出して、懐かしい気持ちになる。", "reading": "このきょくをきくとがくせいじだいをおもいだして、なつかしいきもちになる。", "meaning": "听到这首歌就会想起学生时代，感到很怀念。", "level": "N2", "id": 1623},
    {"word": "毎日残業続きで、体も心も辛くなってきた。", "reading": "まいにちざんぎょうつづきで、からだもこころもつらくなってきた。", "meaning": "每天都在加班，身心都变得很辛苦了。", "level": "N2", "id": 1624},
    {"word": "息が苦しくなるほど走ったのは久しぶりだった。", "reading": "いきがくるしくなるほどはしったのはひさしぶりだった。", "meaning": "好久没跑到喘不上气这么累了。", "level": "N2", "id": 1625},
    {"word": "昨日の台風は風が激しくて、外に出られなかった。", "reading": "きのうのたいふうはかぜがはげしくて、そとにでられなかった。", "meaning": "昨天的台风风太猛了，没法出门。", "level": "N2", "id": 1626},
    {"word": "うちの部長はスケジュールに厳しいから、遅刻は絶対だめだよ。", "reading": "うちのぶちょうはすけじゅーるにきびしいから、ちこくはぜったいだめだよ。", "meaning": "我们部长对时间要求很严格，绝对不能迟到。", "level": "N2", "id": 1627},
    {"word": "敬語の使い分けって本当に難しいよね。", "reading": "けいごのつかいわけってほんとうにむずかしいよね。", "meaning": "敬语的区分使用真的好难啊。", "level": "N2", "id": 1628},
    {"word": "さすが先輩、問題点に対する指摘が鋭いですね。", "reading": "さすがせんぱい、もんだいてんにたいするしてきがするどいですね。", "meaning": "不愧是前辈，对问题的指出很敏锐。", "level": "N2", "id": 1629},
    {"word": "幼い頃、毎年夏はおばあちゃんの家で過ごしてたな。", "reading": "おさないころ、まいとしなつはおばあちゃんのいえですごしてたな。", "meaning": "小时候每年夏天都在奶奶家度过。", "level": "N2", "id": 1630},
    {"word": "電車の中で大声で喧嘩するなんて、みっともないよ。", "reading": "でんしゃのなかでおおごえでけんかするなんて、みっともないよ。", "meaning": "在电车里大声吵架，太丢人了。", "level": "N2", "id": 1631},
    {"word": "30歳にもなって親に頼ってばかりで、情けないと思わないの？", "reading": "さんじゅっさいにもなっておやにたよってばかりで、なさけないとおもわないの？", "meaning": "都30岁了还老是依赖父母，不觉得窝囊吗？", "level": "N2", "id": 1632},
    {"word": "彼がリーダーなら安心だよ。本当に頼もしい人だから。", "reading": "かれがリーダーならあんしんだよ。ほんとうにたのもしいひとだから。", "meaning": "他当领导的话就放心了，真的是很可靠的人。", "level": "N2", "id": 1633},
    {"word": "経験者がチームにいると、やっぱり心強いよね。", "reading": "けいけんしゃがチームにいると、やっぱりこころづよいよね。", "meaning": "队里有经验丰富的人，果然心里有底。", "level": "N2", "id": 1634},
    {"word": "昔の写真を見てたら、なんか切ない気持ちになった。", "reading": "むかしのしゃしんをみてたら、なんかせつないきもちになった。", "meaning": "看着以前的照片，莫名觉得心酸。", "level": "N2", "id": 1635},
    {"word": "味は悪くないけど、量がちょっと物足りないかな。", "reading": "あじはわるくないけど、りょうがちょっとものたりないかな。", "meaning": "味道还不错，但量有点不够。", "level": "N2", "id": 1636},
    {"word": "何度言っても直さないのは、本当に腹立たしい。", "reading": "なんどいってもなおさないのは、ほんとうにはらだたしい。", "meaning": "说了多少遍都不改，真的令人气愤。", "level": "N2", "id": 1637},
    {"word": "社員全員が参加するのが望ましいですが、強制ではありません。", "reading": "しゃいんぜんいんがさんかするのがのぞましいですが、きょうせいではありません。", "meaning": "希望全体员工都参加，但不是强制的。", "level": "N2", "id": 1638},
    {"word": "彼女の明るい性格は、誰からも好ましく思われている。", "reading": "かのじょのあかるいせいかくは、だれからもこのましくおもわれている。", "meaning": "她开朗的性格，谁都觉得很讨人喜欢。", "level": "N2", "id": 1639},
    {"word": "この二つの漢字、形が紛らわしいからよく間違えるんだよね。", "reading": "このふたつのかんじ、かたちがまぎらわしいからよくまちがえるんだよね。", "meaning": "这两个汉字形状容易搞混，经常写错。", "level": "N2", "id": 1640},
    {"word": "彼の返事はいつも曖昧で、結局どうしたいのか分からない。", "reading": "かれのへんじはいつもあいまいで、けっきょくどうしたいのかわからない。", "meaning": "他的回答总是含糊不清，搞不懂他到底想怎样。", "level": "N2", "id": 1641},
    {"word": "期限を明確にしておかないと、みんな動けないよ。", "reading": "きげんをめいかくにしておかないと、みんなうごけないよ。", "meaning": "不把截止日期定明确的话，大家都没法行动。", "level": "N2", "id": 1642},
    {"word": "もうちょっと具体的に教えてくれないと、イメージが湧かない。", "reading": "もうちょっとぐたいてきにおしえてくれないと、いめーじがわかない。", "meaning": "你不再说得具体点的话，我想象不出来。", "level": "N2", "id": 1643},
    {"word": "話が抽象的すぎて、何を言いたいのかよく分からなかった。", "reading": "はなしがちゅうしょうてきすぎて、なにをいいたいのかよくわからなかった。", "meaning": "说的太抽象了，不太明白想表达什么。", "level": "N2", "id": 1644},
    {"word": "彼女は積極的に発言するから、会議がスムーズに進む。", "reading": "かのじょはせっきょくてきにはつげんするから、かいぎがすむーずにすすむ。", "meaning": "她积极发言，所以会议进行得很顺利。", "level": "N2", "id": 1645},
    {"word": "そんなに消極的だと、せっかくのチャンスを逃しちゃうよ。", "reading": "そんなにしょうきょくてきだと、せっかくのちゃんすをのがしちゃうよ。", "meaning": "那么消极的话，难得的机会就错过了哦。", "level": "N2", "id": 1646},
    {"word": "一般的にはそうかもしれないけど、うちの会社はちょっと違うんだよね。", "reading": "いっぱんてきにはそうかもしれないけど、うちのかいしゃはちょっとちがうんだよね。", "meaning": "一般来说可能是那样，但我们公司有点不一样。", "level": "N2", "id": 1647},
    {"word": "このサプリ、肌荒れに効果的だって友達が言ってたから試してみたんだ。", "reading": "このさぷり、はだあれにこうかてきだってともだちがいってたからためしてみたんだ。", "meaning": "朋友说这个保健品对皮肤粗糙很有效，所以我试了试。", "level": "N2", "id": 1648},
    {"word": "自炊した方が経済的だってわかってるけど、つい外食しちゃうんだよね。", "reading": "じすいしたほうがけいざいてきだってわかってるけど、ついがいしょくしちゃうんだよね。", "meaning": "我知道自己做饭更经济实惠，但还是忍不住在外面吃。", "level": "N2", "id": 1649},
    {"word": "残業を減らすには、もっと合理的なやり方を考えないとダメだよ。", "reading": "ざんぎょうをへらすには、もっとごうりてきなやりかたをかんがえないとだめだよ。", "meaning": "要减少加班的话，必须想出更合理的方法才行。", "level": "N2", "id": 1650},
    {"word": "感情的にならないで、もうちょっと客観的に見た方がいいと思うよ。", "reading": "かんじょうてきにならないで、もうちょっときゃっかんてきにみたほうがいいとおもうよ。", "meaning": "别太感情用事，我觉得你应该更客观地看待这件事。", "level": "N2", "id": 1651},
    {"word": "それはちょっと主観的すぎない？データで確認してみようよ。", "reading": "それはちょっとしゅかんてきすぎない？でーたでかくにんしてみようよ。", "meaning": "那是不是太主观了？用数据确认一下吧。", "level": "N2", "id": 1652},

function handleLogin() {
  const input = document.getElementById('loginId').value.trim().toLowerCase();
  const msg = document.getElementById('loginMsg');
  const btn = document.getElementById('loginBtn');
  if (!input || input.length < 2) { msg.textContent = 'ID至少2个字符'; msg.className = 'login-msg error'; return; }
  if (!/^[a-z0-9_-]+$/.test(input)) { msg.textContent = '只能用英文小写、数字、-、_'; msg.className = 'login-msg error'; return; }
  btn.disabled = true;
  msg.textContent = '正在连接...'; msg.className = 'login-msg';

  db.ref('users/' + input).once('value').then(snap => {
    if (snap.exists()) {
      msg.textContent = '找到已有数据，正在恢复...'; msg.className = 'login-msg success';
      const data = snap.val();
      localStats = data.stats || {};
      localCounts = data.counts || {};
      localStorage.setItem('jp_stats', JSON.stringify(localStats));
      localStorage.setItem('jp_item_counts', JSON.stringify(localCounts));
      localStorage.setItem('jp_delays', JSON.stringify(data.delays || {}));
    } else {
      msg.textContent = '新ID，开始学习吧！'; msg.className = 'login-msg success';
      localStats = JSON.parse(localStorage.getItem('jp_stats') || '{}');
      localCounts = JSON.parse(localStorage.getItem('jp_item_counts') || '{}');
      syncToCloud();
    }
    userId = input;
    localStorage.setItem('jp_user_id', userId);
    setTimeout(() => {
      document.getElementById('loginOverlay').style.display = 'none';
      updateHeaderUser();
      renderList();
    }, 600);
  }).catch(err => {
    msg.textContent = '连接失败，请检查网络'; msg.className = 'login-msg error';
    btn.disabled = false;
  });
}

function syncToCloud() {
  if (!userId || !db) return;
  db.ref('users/' + userId).set({ stats: localStats, counts: localCounts, delays: JSON.parse(localStorage.getItem('jp_delays') || '{}') });
}

function debouncedSync() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncToCloud, 2000);
}

  return JSON.parse(localStorage.getItem('jp_stats') || '{}');

const MASTERED_THRESHOLD = 50;
function recordItemSeen(cat, id) {
  const c = getItemCounts();
  const key = cat + ':' + id;
  c[key] = (c[key] || 0) + 1;
  saveItemCounts(c);
  return c[key];
}
function getActiveItems(cat) {
  const c = getItemCounts();
  const delays = getDelays();
  const today = new Date().toISOString().slice(0, 10);
  if (cat === 'mix') {
    let all = [];
    for (const k of ['nouns', 'sentences']) {
      DATA[k].forEach(it => {
        const key = k + ':' + it.id;
        if ((c[key] || 0) < MASTERED_THRESHOLD && !(delays[key] > today)) {
          all.push({...it, _cat: k});
        }
      });
    }
    // Shuffle
    for (let i = all.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [all[i], all[j]] = [all[j], all[i]];
    }
    return all;
  }
  return DATA[cat].filter(it => {
    const key = cat + ':' + it.id;
    return (c[key] || 0) < MASTERED_THRESHOLD && !(delays[key] > today);
  });
}
function isMastered(cat, id) {
  const c = getItemCounts();
  return (c[cat + ':' + id] || 0) >= MASTERED_THRESHOLD;
}
function getItemCount(cat, id) {
  const c = getItemCounts();
  return c[cat + ':' + id] || 0;
}

// ===== SPACED REPETITION DELAY =====
function getDelays() {
  return JSON.parse(localStorage.getItem('jp_delays') || '{}');
}
function saveDelays(d) {
  localStorage.setItem('jp_delays', JSON.stringify(d));
  debouncedSync();
}
function delayItem(cat, id, days) {
  const d = getDelays();
  const until = new Date();
  until.setDate(until.getDate() + days);
  d[cat + ':' + id] = until.toISOString().slice(0, 10);
  saveDelays(d);
}
function isDelayed(cat, id) {
  const d = getDelays();
  const until = d[cat + ':' + id];
  if (!until) return false;
  return until > new Date().toISOString().slice(0, 10);
}
function markKnown(days) {
  const items = getActiveItems(currentCat);
  if (!items.length) return;
  const it = items[studyIndex];
  delayItem(it._cat || currentCat, it.id, days || 3);
  renderStudyCard();
}

function recordStudy() {
  const s = getStats();
  const d = todayKey();
  if (!s[d]) s[d] = { studied: 0, quizzed: 0, correct: 0, wrong: {} };
  s[d].studied++;

function recordQuiz(item, correct) {
  const s = getStats();
  const d = todayKey();
  if (!s[d]) s[d] = { studied: 0, quizzed: 0, correct: 0, wrong: {} };
  s[d].quizzed++;
  if (correct) s[d].correct++;
  else {

    currentAudio = new Audio('audio/' + fn);

}
function speakWithExample(word, example) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  if (!fn1) return;
  currentAudio = new Audio('audio/' + fn1);
  currentAudio.play().catch(() => {});

    currentAudio.onended = () => {
      currentAudio = new Audio('audio/' + AUDIO_MAP[example]);
      currentAudio.play().catch(() => {});

  }
}
